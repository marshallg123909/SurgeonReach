<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SurgeonReach</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#060d18;color:white;font-family:'DM Mono',monospace}
    input:focus,select:focus,textarea:focus{outline:none}
    button:hover{opacity:0.85}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#1a2a3a}
    input::placeholder{color:#3a4a5a}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const DEMO = { email:"demo@acmedevices.com", password:"demo123" };
    const LEADS = [
      {id:1,name:"Dr. James Mitchell",spec:"Orthopedic Surgery",hospital:"Memorial Hermann",city:"Houston",state:"TX",dept:"Surgery",score:9,status:"hot"},
      {id:2,name:"Dr. Sarah Chen",spec:"Sports Medicine",hospital:"UT Southwestern",city:"Dallas",state:"TX",dept:"Surgery",score:8,status:"warm"},
      {id:3,name:"Dr. Michael Webb",spec:"Orthopedic Surgery",hospital:"Mayo Clinic",city:"Phoenix",state:"AZ",dept:"Surgery",score:9,status:"hot"},
      {id:4,name:"Sarah Johnson",spec:"Materials Manager",hospital:"Memorial Hermann",city:"Houston",state:"TX",dept:"Materials Management",score:8,status:"hot"},
      {id:5,name:"Tom Bradley",spec:"Supply Chain Director",hospital:"UT Southwestern",city:"Dallas",state:"TX",dept:"Materials Management",score:7,status:"warm"},
      {id:6,name:"Linda Reeves",spec:"Procurement Specialist",hospital:"Mayo Clinic",city:"Phoenix",state:"AZ",dept:"Materials Management",score:6,status:"contacted"},
      {id:7,name:"Lisa Park",spec:"OR Nurse Manager",hospital:"St. David's Medical",city:"Austin",state:"TX",dept:"Nursing",score:8,status:"hot"},
      {id:8,name:"James Okonkwo",spec:"Charge Nurse",hospital:"Baptist Health",city:"San Antonio",state:"TX",dept:"Nursing",score:6,status:"warm"},
      {id:9,name:"Mark Stevens",spec:"CFO",hospital:"Baptist Health",city:"San Antonio",state:"TX",dept:"Administration",score:6,status:"contacted"},
      {id:10,name:"Dr. Rachel Kim",spec:"Clinical Pharmacist",hospital:"Memorial Hermann",city:"Houston",state:"TX",dept:"Pharmacy",score:5,status:"contacted"},
    ];
    const REPLIES_INIT = [
      {id:1,doctor:"Dr. James Mitchell",type:"positive",msg:"I'd be open to learning more. What sets your device apart?",time:"2 hrs ago",approved:false},
      {id:2,doctor:"Sarah Johnson",type:"objection",msg:"We're locked into our GPO contract until Q4.",time:"5 hrs ago",approved:false},
      {id:3,doctor:"Dr. Michael Webb",type:"positive",msg:"We're evaluating new vendors. Can you send clinical data?",time:"1 day ago",approved:false},
      {id:4,doctor:"Dr. Robert Torres",type:"hard_no",msg:"Please remove me from your list.",time:"1 day ago",approved:false},
    ];
    const DEPTS = ["All","Surgery","Materials Management","Nursing","Administration","Pharmacy","Radiology"];
    const STATES = ["AL","AK","AZ","AR","CA","CO","CT","DE","FL","GA","HI","ID","IL","IN","IA","KS","KY","LA","ME","MD","MA","MI","MN","MS","MO","MT","NE","NV","NH","NJ","NM","NY","NC","ND","OH","OK","OR","PA","RI","SC","SD","TN","TX","UT","VT","VA","WA","WV","WI","WY"];
    const DC = (d) => ({"Surgery":"#3b82f6","Materials Management":"#8b5cf6","Nursing":"#10b981","Administration":"#f59e0b","Pharmacy":"#ec4899","Radiology":"#06b6d4"}[d]||"#6b7280");

    const S = {
      card:{background:"#0c1829",border:"1px solid #1a2a3a",borderRadius:"12px",padding:"20px",marginBottom:"14px"},
      btn:{background:"linear-gradient(135deg,#0055ee,#0099ff)",border:"none",borderRadius:"8px",padding:"8px 16px",color:"white",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:"13px"},
      bsm:{background:"rgba(0,102,255,0.15)",border:"1px solid rgba(0,102,255,0.3)",borderRadius:"6px",padding:"4px 10px",color:"#4499ff",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:"11px"},
      bgr:{background:"rgba(0,200,100,0.1)",border:"1px solid rgba(0,200,100,0.2)",borderRadius:"6px",padding:"4px 10px",color:"#00e87a",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:"11px"},
      inp:{background:"#060d18",border:"1px solid #1a2a3a",borderRadius:"8px",padding:"10px 14px",color:"white",fontSize:"13px",fontFamily:"'DM Mono',monospace",width:"100%"},
    };

    function App() {
      const [page,setPage]=useState("login");
      const [tab,setTab]=useState("dashboard");
      const [email,setEmail]=useState("");
      const [password,setPassword]=useState("");
      const [loginErr,setLoginErr]=useState("");
      const [leads,setLeads]=useState(LEADS);
      const [replies,setReplies]=useState(REPLIES_INIT);
      const [dept,setDept]=useState("All");
      const [sState,setSState]=useState("TX");
      const [sCity,setSCity]=useState("");
      const [sResults,setSResults]=useState([]);
      const [searching,setSearching]=useState(false);
      const [aiTexts,setAiTexts]=useState({});
      const [aiLoad,setAiLoad]=useState({});
      const [notif,setNotif]=useState(null);
      const [selLead,setSelLead]=useState(null);

      const showNotif=(m)=>{setNotif(m);setTimeout(()=>setNotif(null),2500)};

      const callClaude=async(prompt,key)=>{
        setAiLoad(p=>({...p,[key]:true}));
        try{
          const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,messages:[{role:"user",content:prompt}]})});
          const data=await res.json();
          setAiTexts(p=>({...p,[key]:data.content?.map(c=>c.text||"").join("")||"No response"}));
        }catch(e){setAiTexts(p=>({...p,[key]:"AI unavailable."}))}
        setAiLoad(p=>({...p,[key]:false}));
      };

      const doSearch=async()=>{
        setSearching(true);setSResults([]);
        try{
          const p=new URLSearchParams({taxonomy_description:"Orthopaedic Surgery",state:sState,limit:"15",version:"2.1"});
          if(sCity)p.set("city",sCity.toUpperCase());
          const res=await fetch("https://npiregistry.cms.hhs.gov/api/?"+p);
          const data=await res.json();
          setSResults((data.results||[]).map(r=>{const a=r.addresses?.[0]||{},b=r.basic||{};return{id:r.number,npi:r.number,name:`Dr. ${b.first_name||""} ${b.last_name||""}`.trim(),spec:r.taxonomies?.[0]?.desc||"Orthopedic Surgery",hospital:a.organization_name||"Private Practice",city:a.city||"",state:a.state||sState,dept:"Surgery",score:null,status:"new"}}));
        }catch(e){}
        setSearching(false);
      };

      const filtered=dept==="All"?leads:leads.filter(l=>l.dept===dept);
      const pending=replies.filter(r=>!r.approved&&r.type!=="hard_no").length;

      const login=()=>{
        if(email===DEMO.email&&password===DEMO.password){setPage("app");setLoginErr("");}
        else setLoginErr("Invalid credentials. Use demo@acmedevices.com / demo123");
      };

      if(page==="login") return(
        <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#060d18"}}>
          <div style={{width:"360px"}}>
            <div style={{textAlign:"center",marginBottom:"32px"}}>
              <div style={{fontFamily:"Syne",fontWeight:800,fontSize:"28px",color:"white"}}>SurgeonReach</div>
              <div style={{color:"#4a6080",fontSize:"12px",marginTop:"4px"}}>AI-POWERED MEDICAL DEVICE SALES</div>
            </div>
            <div style={{background:"#0c1829",border:"1px solid #1a2a3a",borderRadius:"16px",padding:"32px"}}>
              <div style={{marginBottom:"14px"}}>
                <label style={{display:"block",color:"#4a7090",fontSize:"11px",letterSpacing:"0.1em",marginBottom:"6px"}}>EMAIL</label>
                <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="demo@acmedevices.com" style={S.inp}/>
              </div>
              <div style={{marginBottom:"20px"}}>
                <label style={{display:"block",color:"#4a7090",fontSize:"11px",letterSpacing:"0.1em",marginBottom:"6px"}}>PASSWORD</label>
                <input type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="••••••••" style={S.inp}/>
              </div>
              {loginErr&&<p style={{color:"#ff4444",fontSize:"12px",marginBottom:"12px"}}>{loginErr}</p>}
              <button onClick={login} style={{...S.btn,width:"100%",padding:"12px",fontSize:"15px",fontFamily:"Syne",fontWeight:700}}>Sign In →</button>
              <div style={{marginTop:"16px",background:"#060d18",borderRadius:"8px",padding:"10px",border:"1px solid #1a2a3a",color:"#4a6080",fontSize:"11px",lineHeight:"1.6"}}>
                DEMO: demo@acmedevices.com / demo123
              </div>
            </div>
          </div>
        </div>
      );

      return(
        <div style={{display:"flex",minHeight:"100vh"}}>
          {notif&&<div style={{position:"fixed",top:"16px",right:"16px",background:"#0a2a1a",border:"1px solid #00e87a",borderRadius:"8px",padding:"10px 18px",color:"#00e87a",fontSize:"13px",zIndex:999}}>{notif}</div>}
          <div style={{width:"220px",flexShrink:0,background:"#0a1525",borderRight:"1px solid #1a2a3a",display:"flex",flexDirection:"column",padding:"24px 0",position:"fixed",top:0,bottom:0,left:0}}>
            <div style={{padding:"0 18px 18px",borderBottom:"1px solid #1a2a3a",marginBottom:"10px"}}>
              <div style={{fontFamily:"Syne",fontWeight:800,fontSize:"18px",color:"white"}}>SurgeonReach</div>
              <div style={{color:"#4a6080",fontSize:"11px",marginTop:"4px"}}>Acme Orthopedics</div>
            </div>
            {[{id:"dashboard",label:"Dashboard"},{id:"pipeline",label:"Pipeline"},{id:"search",label:"Find Surgeons"},{id:"replies",label:"Replies",badge:pending},{id:"outreach",label:"Outreach"}].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{display:"flex",alignItems:"center",gap:"10px",width:"100%",padding:"10px 18px",background:tab===t.id?"rgba(0,102,255,0.15)":"transparent",border:tab===t.id?"1px solid rgba(0,102,255,0.3)":"1px solid transparent",borderRadius:"8px",color:tab===t.id?"#4499ff":"#4a6080",fontFamily:"'DM Mono',monospace",fontSize:"13px",cursor:"pointer",textAlign:"left",margin:"2px 8px"}}>
                {t.label}
                {t.badge>0&&<span style={{marginLeft:"auto",background:"#0055ee",color:"white",borderRadius:"10px",padding:"1px 7px",fontSize:"10px"}}>{t.badge}</span>}
              </button>
            ))}
            <div style={{marginTop:"auto",padding:"14px 18px",borderTop:"1px solid #1a2a3a"}}>
              <button onClick={()=>setPage("login")} style={{background:"none",border:"none",color:"#4a6080",fontSize:"12px",cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>← Sign Out</button>
            </div>
          </div>

          <div style={{marginLeft:"220px",padding:"28px",flex:1,minHeight:"100vh"}}>

            {tab==="dashboard"&&(
              <div>
                <h1 style={{fontFamily:"Syne",fontWeight:800,fontSize:"26px",margin:"0 0 4px",letterSpacing:"-0.5px"}}>Good morning, Acme Orthopedics</h1>
                <p style={{color:"#4a6080",margin:"0 0 24px",fontSize:"13px"}}>Here's your pipeline overview</p>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"12px",marginBottom:"20px"}}>
                  {[{label:"Total Leads",value:leads.length,color:"#4499ff"},{label:"Hot Leads",value:leads.filter(l=>l.status==="hot").length,color:"#00e87a"},{label:"Meetings Booked",value:3,color:"#ffb800"},{label:"Positive Replies",value:replies.filter(r=>r.type==="positive").length,color:"#cc66ff"}].map(s=>(
                    <div key={s.label} style={S.card}>
                      <p style={{color:"#4a6080",fontSize:"11px",margin:"0 0 6px",letterSpacing:"0.1em"}}>{s.label.toUpperCase()}</p>
                      <p style={{fontFamily:"Syne",fontSize:"32px",fontWeight:800,margin:0,color:s.color}}>{s.value}</p>
                    </div>
                  ))}
                </div>
                <div style={S.card}>
                  <p style={{fontFamily:"Syne",fontWeight:700,fontSize:"15px",margin:"0 0 14px"}}>Pipeline by Department</p>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px"}}>
                    {["Surgery","Materials Management","Nursing","Administration","Pharmacy","Radiology"].map(d=>(
                      <div key={d} onClick={()=>{setDept(d);setTab("pipeline")}} style={{background:"#060d18",border:`1px solid ${DC(d)}33`,borderRadius:"8px",padding:"12px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{color:DC(d),fontSize:"12px",fontFamily:"Syne",fontWeight:600}}>{d}</span>
                        <span style={{fontFamily:"Syne",fontWeight:800,fontSize:"20px",color:DC(d)}}>{leads.filter(l=>l.dept===d).length}</span>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px"}}>
                  <div style={S.card}>
                    <p style={{fontFamily:"Syne",fontWeight:700,fontSize:"15px",margin:"0 0 12px"}}>🔥 Hot Leads</p>
                    {leads.filter(l=>l.status==="hot").map(l=>(
                      <div key={l.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #1a2a3a"}}>
                        <div>
                          <p style={{margin:"0 0 3px",fontFamily:"Syne",fontWeight:600,fontSize:"13px"}}>{l.name}</p>
                          <span style={{fontSize:"10px",padding:"2px 7px",borderRadius:"10px",background:`${DC(l.dept)}22`,color:DC(l.dept),border:`1px solid ${DC(l.dept)}44`}}>{l.dept}</span>
                        </div>
                        <span style={{color:"#00e87a",fontFamily:"Syne",fontWeight:700,fontSize:"16px"}}>{l.score}/10</span>
                      </div>
                    ))}
                  </div>
                  <div style={S.card}>
                    <p style={{fontFamily:"Syne",fontWeight:700,fontSize:"15px",margin:"0 0 12px"}}>💬 Recent Replies</p>
                    {replies.slice(0,4).map(r=>{
                      const tc=r.type==="positive"?"#00e87a":r.type==="objection"?"#ffb800":"#ff4444";
                      return(<div key={r.id} onClick={()=>setTab("replies")} style={{padding:"8px 0",borderBottom:"1px solid #1a2a3a",cursor:"pointer"}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}>
                          <span style={{fontFamily:"Syne",fontWeight:600,fontSize:"13px"}}>{r.doctor}</span>
                          <span style={{fontSize:"10px",padding:"2px 7px",borderRadius:"4px",background:`${tc}18`,color:tc,border:`1px solid ${tc}`}}>{r.type.replace("_"," ")}</span>
                        </div>
                        <p style={{margin:0,color:"#4a6080",fontSize:"12px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.msg}</p>
                      </div>);
                    })}
                  </div>
                </div>
              </div>
            )}

            {tab==="pipeline"&&(
              <div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>
                  <h1 style={{fontFamily:"Syne",fontWeight:800,fontSize:"26px",margin:0}}>Lead Pipeline</h1>
                  <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                    {DEPTS.map(d=>(
                      <button key={d} onClick={()=>setDept(d)} style={{fontSize:"11px",padding:"4px 12px",borderRadius:"20px",border:`1px solid ${dept===d?DC(d):"#1a2a3a"}`,background:dept===d?`${DC(d)}22`:"transparent",color:dept===d?DC(d):"#4a6080",cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>
                        {d}{d!=="All"?` (${leads.filter(l=>l.dept===d).length})`:""}
                      </button>
                    ))}
                  </div>
                </div>
                <div style={{background:"#0c1829",border:"1px solid #1a2a3a",borderRadius:"12px",overflow:"hidden"}}>
                  <div style={{display:"grid",gridTemplateColumns:"2fr 1.2fr 1fr 0.6fr 0.6fr 1.4fr",padding:"10px 16px",borderBottom:"1px solid #1a2a3a",color:"#4a6080",fontSize:"10px",letterSpacing:"0.1em"}}>
                    <span>CONTACT</span><span>HOSPITAL</span><span>DEPARTMENT</span><span>STATE</span><span>SCORE</span><span>ACTIONS</span>
                  </div>
                  {filtered.map(l=>{
                    const sk="score_"+l.id,ek="email_"+l.id,isExp=selLead===l.id;
                    return(<div key={l.id} style={{borderBottom:"1px solid #1a2a3a"}}>
                      <div onClick={()=>setSelLead(isExp?null:l.id)} style={{display:"grid",gridTemplateColumns:"2fr 1.2fr 1fr 0.6fr 0.6fr 1.4fr",padding:"12px 16px",cursor:"pointer",background:isExp?"rgba(0,102,255,0.04)":"transparent",alignItems:"center"}}>
                        <div><p style={{margin:"0 0 2px",fontFamily:"Syne",fontWeight:600,fontSize:"13px"}}>{l.name}</p><p style={{margin:0,color:"#4a6080",fontSize:"11px"}}>{l.spec}</p></div>
                        <p style={{margin:0,color:"#8a9ab0",fontSize:"12px"}}>{l.hospital}</p>
                        <span style={{fontSize:"10px",padding:"2px 8px",borderRadius:"10px",background:`${DC(l.dept)}22`,color:DC(l.dept),border:`1px solid ${DC(l.dept)}44`,display:"inline-block"}}>{l.dept}</span>
                        <p style={{margin:0,color:"#8a9ab0",fontSize:"12px"}}>{l.state}</p>
                        <p style={{margin:0,fontFamily:"Syne",fontWeight:700,fontSize:"16px",color:l.score>=8?"#00e87a":"#ffb800"}}>{l.score||"—"}</p>
                        <div style={{display:"flex",gap:"6px"}} onClick={e=>e.stopPropagation()}>
                          <button onClick={()=>callClaude(`Score this medical device lead 1-10 with 2 sentence reason. Name: ${l.name}, Role: ${l.spec}, Dept: ${l.dept}, Hospital: ${l.hospital}. Format: SCORE: X/10\nREASON: [reason]`,sk)} style={S.bsm}>{aiLoad[sk]?"...":"Score"}</button>
                          <button onClick={()=>{callClaude(`Write a cold outreach email under 80 words to ${l.name}, ${l.spec} in ${l.dept} at ${l.hospital}. We sell orthopedic implants. Be conversational. Body only.`,ek);setSelLead(l.id)}} style={S.bgr}>{aiLoad[ek]?"...":"Email"}</button>
                        </div>
                      </div>
                      {isExp&&(aiTexts[sk]||aiTexts[ek])&&(
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",padding:"0 16px 14px"}}>
                          {aiTexts[sk]&&<div style={{background:"#060d18",border:"1px solid #1a2a3a",borderRadius:"8px",padding:"12px"}}><p style={{color:"#4a6080",fontSize:"10px",margin:"0 0 6px",letterSpacing:"0.1em"}}>AI SCORE</p><p style={{color:"#ccd6e0",fontSize:"12px",margin:0,lineHeight:"1.6",whiteSpace:"pre-line"}}>{aiTexts[sk]}</p></div>}
                          {aiTexts[ek]&&<div style={{background:"rgba(0,102,255,0.05)",border:"1px solid rgba(0,102,255,0.2)",borderRadius:"8px",padding:"12px"}}><p style={{color:"#4a6080",fontSize:"10px",margin:"0 0 6px",letterSpacing:"0.1em"}}>AI EMAIL</p><p style={{color:"#ccd6e0",fontSize:"12px",margin:0,lineHeight:"1.6"}}>{aiTexts[ek]}</p></div>}
                        </div>
                      )}
                    </div>);
                  })}
                  {filtered.length===0&&<div style={{padding:"32px",textAlign:"center",color:"#4a6080",fontSize:"13px"}}>No leads in this department yet.</div>}
                </div>
              </div>
            )}

            {tab==="search"&&(
              <div>
                <h1 style={{fontFamily:"Syne",fontWeight:800,fontSize:"26px",margin:"0 0 4px"}}>Find Orthopedic Surgeons</h1>
                <p style={{color:"#4a6080",margin:"0 0 20px",fontSize:"13px"}}>Live NPI Registry — 900,000+ licensed providers</p>
                <div style={S.card}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:"12px",alignItems:"end"}}>
                    <div>
                      <label style={{display:"block",color:"#4a7090",fontSize:"11px",letterSpacing:"0.1em",marginBottom:"6px"}}>STATE</label>
                      <select value={sState} onChange={e=>setSState(e.target.value)} style={S.inp}>{STATES.map(s=><option key={s}>{s}</option>)}</select>
                    </div>
                    <div>
                      <label style={{display:"block",color:"#4a7090",fontSize:"11px",letterSpacing:"0.1em",marginBottom:"6px"}}>CITY (OPTIONAL)</label>
                      <input value={sCity} onChange={e=>setSCity(e.target.value)} placeholder="e.g. Houston" style={S.inp}/>
                    </div>
                    <button onClick={()=>!searching&&doSearch()} style={S.btn}>{searching?"Searching...":"Search NPI →"}</button>
                  </div>
                </div>
                {sResults.length>0&&(
                  <div style={{background:"#0c1829",border:"1px solid #1a2a3a",borderRadius:"12px",overflow:"hidden"}}>
                    <div style={{padding:"12px 16px",borderBottom:"1px solid #1a2a3a",display:"flex",justifyContent:"space-between"}}>
                      <span style={{fontFamily:"Syne",fontWeight:700}}>{sResults.length} surgeons found</span>
                      <span style={{color:"#4a6080",fontSize:"12px"}}>Live NPI data</span>
                    </div>
                    {sResults.map((l,i)=>(
                      <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1.5fr 1fr 1fr",gap:"8px",padding:"12px 16px",borderBottom:"1px solid #1a2a3a",alignItems:"center"}}>
                        <div><p style={{margin:"0 0 2px",fontFamily:"Syne",fontWeight:600,fontSize:"13px"}}>{l.name}</p><p style={{margin:0,color:"#4a6080",fontSize:"11px"}}>NPI: {l.npi}</p></div>
                        <p style={{margin:0,color:"#8a9ab0",fontSize:"12px"}}>{l.hospital}</p>
                        <p style={{margin:0,color:"#8a9ab0",fontSize:"12px"}}>{l.city}, {l.state}</p>
                        <button onClick={()=>{setLeads(p=>[...p,{...l,score:Math.floor(Math.random()*4)+6,status:"contacted"}]);showNotif(`${l.name} added!`)}} style={{...S.bgr,justifySelf:"end"}}>+ Add</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {tab==="replies"&&(
              <div>
                <h1 style={{fontFamily:"Syne",fontWeight:800,fontSize:"26px",margin:"0 0 4px"}}>Reply Management</h1>
                <p style={{color:"#4a6080",margin:"0 0 20px",fontSize:"13px"}}>AI classifies and drafts responses — you approve before sending</p>
                {replies.map(r=>{
                  const rk="reply_"+r.id;
                  const tc=r.type==="positive"?"#00e87a":r.type==="objection"?"#ffb800":"#ff4444";
                  return(<div key={r.id} style={{...S.card,opacity:r.approved?0.6:1}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                        <span style={{fontFamily:"Syne",fontWeight:700,fontSize:"15px"}}>{r.doctor}</span>
                        <span style={{fontSize:"10px",padding:"2px 8px",borderRadius:"4px",background:`${tc}18`,color:tc,border:`1px solid ${tc}`}}>{r.type.replace("_"," ").toUpperCase()}</span>
                        {r.approved&&<span style={{color:"#00e87a",fontSize:"12px"}}>✓ Sent</span>}
                      </div>
                      <span style={{color:"#4a6080",fontSize:"11px"}}>{r.time}</span>
                    </div>
                    <div style={{background:"#060d18",border:"1px solid #1a2a3a",borderRadius:"8px",padding:"12px",marginBottom:"12px"}}>
                      <p style={{color:"#4a6080",fontSize:"10px",margin:"0 0 5px",letterSpacing:"0.1em"}}>THEIR MESSAGE</p>
                      <p style={{color:"#ccd6e0",margin:0,fontSize:"13px",lineHeight:"1.6"}}>{r.msg}</p>
                    </div>
                    {r.type==="hard_no"&&<div style={{background:"#1a0a0a",border:"1px solid #3a1a1a",borderRadius:"6px",padding:"10px 12px",color:"#ff6666",fontSize:"12px"}}>✗ Removed from all sequences — marked Do Not Contact</div>}
                    {r.type!=="hard_no"&&!r.approved&&(
                      <div>
                        {!aiTexts[rk]&&!aiLoad[rk]&&<button onClick={()=>callClaude(r.type==="positive"?`Draft a warm reply to: "${r.msg}". Under 70 words, suggest a 15-min call.`:`Draft a tactful objection response to: "${r.msg}". Under 60 words.`,rk)} style={S.bsm}>⟳ Generate AI Response</button>}
                        {aiLoad[rk]&&<p style={{color:"#4499ff",fontSize:"13px"}}>⟳ Drafting...</p>}
                        {aiTexts[rk]&&(
                          <div>
                            <div style={{background:"rgba(0,102,255,0.06)",border:"1px solid rgba(0,102,255,0.2)",borderRadius:"8px",padding:"12px",marginBottom:"10px"}}>
                              <p style={{color:"#4a6080",fontSize:"10px",margin:"0 0 6px",letterSpacing:"0.1em"}}>AI DRAFTED RESPONSE</p>
                              <p style={{color:"#ccd6e0",margin:0,fontSize:"13px",lineHeight:"1.6"}}>{aiTexts[rk]}</p>
                            </div>
                            <div style={{display:"flex",gap:"8px"}}>
                              <button onClick={()=>{setReplies(p=>p.map(x=>x.id===r.id?{...x,approved:true}:x));showNotif("Reply approved!")}} style={{...S.btn,fontSize:"12px"}}>✓ Approve & Send</button>
                              <button onClick={()=>callClaude(`Rewrite this differently: ${aiTexts[rk]}`,rk)} style={S.bsm}>↺ Regenerate</button>
                            </div>
                          </div>
                        )}
                      </div>
                    )}
                  </div>);
                })}
              </div>
            )}

            {tab==="outreach"&&(
              <div>
                <h1 style={{fontFamily:"Syne",fontWeight:800,fontSize:"26px",margin:"0 0 4px"}}>Outreach Sequences</h1>
                <p style={{color:"#4a6080",margin:"0 0 20px",fontSize:"13px"}}>Active automated campaigns</p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px",marginBottom:"14px"}}>
                  {[{name:"Texas Orthopedic Surgeons",status:"Active",sent:148,opens:62,replies:8,meetings:2},{name:"Materials Management — TX",status:"Active",sent:95,opens:41,replies:6,meetings:1},{name:"OR Nursing Leadership",status:"Active",sent:67,opens:28,replies:5,meetings:1},{name:"Arizona Sports Medicine",status:"Paused",sent:73,opens:31,replies:4,meetings:1}].map(s=>(
                    <div key={s.name} style={S.card}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
                        <span style={{fontFamily:"Syne",fontWeight:700,fontSize:"14px"}}>{s.name}</span>
                        <span style={{fontSize:"10px",padding:"2px 8px",borderRadius:"10px",background:s.status==="Active"?"#0a2a1a":"#1a1a2a",color:s.status==="Active"?"#00e87a":"#4a6080",border:`1px solid ${s.status==="Active"?"#00e87a":"#2a2a4a"}`}}>{s.status}</span>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",textAlign:"center",gap:"6px"}}>
                        {[["Sent",s.sent,"#4a6080"],["Opens",s.opens,"#4499ff"],["Replies",s.replies,"#ffb800"],["Meetings",s.meetings,"#00e87a"]].map(([l,v,c])=>(
                          <div key={l}><p style={{fontFamily:"Syne",fontWeight:700,fontSize:"20px",color:c,margin:"0 0 2px"}}>{v}</p><p style={{color:"#4a6080",fontSize:"10px",margin:0}}>{l}</p></div>
                        ))}
                      </div>
                      <div style={{marginTop:"12px",background:"#060d18",borderRadius:"4px",height:"3px",overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${Math.round(s.opens/s.sent*100)}%`,background:"linear-gradient(90deg,#0055ee,#00ccff)",borderRadius:"4px"}}/>
                      </div>
                      <p style={{color:"#4a6080",fontSize:"11px",margin:"5px 0 0"}}>{Math.round(s.opens/s.sent*100)}% open rate</p>
                    </div>
                  ))}
                </div>
                <div style={{...S.card,textAlign:"center",border:"1px solid rgba(0,102,255,0.3)",background:"rgba(0,102,255,0.05)"}}>
                  <p style={{fontFamily:"Syne",fontWeight:700,fontSize:"15px",margin:"0 0 6px"}}>Launch a New Campaign</p>
                  <p style={{color:"#4a6080",fontSize:"13px",margin:"0 0 14px"}}>Select a contact list and we'll generate personalized sequences automatically</p>
                  <button style={S.btn}>+ New Campaign</button>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
