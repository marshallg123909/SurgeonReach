<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ProviderPath — Medical Device Sales Intelligence</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f5f6f8;color:#0f1923;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.5}
    input:focus,select:focus,textarea:focus{outline:none}
    button{font-family:'Plus Jakarta Sans',sans-serif}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:#f0f1f3}
    ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}
    input::placeholder{color:#94a3b8}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
    .fade-in{animation:fadeIn 0.3s ease forwards}
    .loading-dot{animation:pulse 1.4s ease infinite}
    .loading-dot:nth-child(2){animation-delay:0.2s}
    .loading-dot:nth-child(3){animation-delay:0.4s}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;

const DEMO = {email:"demo@acmedevices.com", password:"demo123", company:"Acme Orthopedics", rep:"Alex Johnson"};

const LEADS = [
  {id:1,name:"Dr. James Mitchell",spec:"Orthopedic Surgery",hospital:"Memorial Hermann",city:"Houston",state:"TX",dept:"Surgery",score:9,status:"hot",phone:"(713) 555-0142",notes:"",lastContact:"2 days ago"},
  {id:2,name:"Dr. Sarah Chen",spec:"Sports Medicine",hospital:"UT Southwestern",city:"Dallas",state:"TX",dept:"Surgery",score:8,status:"warm",phone:"(214) 555-0198",notes:"",lastContact:"5 days ago"},
  {id:3,name:"Dr. Michael Webb",spec:"Orthopedic Surgery",hospital:"Mayo Clinic",city:"Phoenix",state:"AZ",dept:"Surgery",score:9,status:"hot",phone:"(480) 555-0156",notes:"",lastContact:"1 day ago"},
  {id:4,name:"Sarah Johnson",spec:"Materials Manager",hospital:"Memorial Hermann",city:"Houston",state:"TX",dept:"Materials Management",score:8,status:"hot",phone:"(713) 555-0199",notes:"",lastContact:"Today"},
  {id:5,name:"Tom Bradley",spec:"Supply Chain Director",hospital:"UT Southwestern",city:"Dallas",state:"TX",dept:"Materials Management",score:7,status:"warm",phone:"(214) 555-0177",notes:"",lastContact:"3 days ago"},
  {id:6,name:"Linda Reeves",spec:"Procurement Specialist",hospital:"Mayo Clinic",city:"Phoenix",state:"AZ",dept:"Materials Management",score:6,status:"contacted",phone:"(480) 555-0133",notes:"",lastContact:"1 week ago"},
  {id:7,name:"Lisa Park",spec:"OR Nurse Manager",hospital:"St. David's Medical",city:"Austin",state:"TX",dept:"Nursing",score:8,status:"hot",phone:"(512) 555-0144",notes:"",lastContact:"Today"},
  {id:8,name:"James Okonkwo",spec:"Charge Nurse",hospital:"Baptist Health",city:"San Antonio",state:"TX",dept:"Nursing",score:6,status:"warm",phone:"(210) 555-0166",notes:"",lastContact:"4 days ago"},
  {id:9,name:"Mark Stevens",spec:"CFO",hospital:"Baptist Health",city:"San Antonio",state:"TX",dept:"Administration",score:6,status:"contacted",phone:"(210) 555-0134",notes:"",lastContact:"1 week ago"},
  {id:10,name:"Dr. Rachel Kim",spec:"Clinical Pharmacist",hospital:"Memorial Hermann",city:"Houston",state:"TX",dept:"Pharmacy",score:5,status:"contacted",phone:"(713) 555-0177",notes:"",lastContact:"2 weeks ago"},
];

const REPLIES_INIT = [
  {id:1,doctor:"Dr. James Mitchell",dept:"Surgery",type:"positive",msg:"I'd be open to learning more about your device. What sets it apart from what we currently use?",time:"2 hours ago",approved:false},
  {id:2,doctor:"Sarah Johnson",dept:"Materials Management",type:"objection",msg:"We're locked into our GPO contract until Q4. Not a great time.",time:"5 hours ago",approved:false},
  {id:3,doctor:"Dr. Michael Webb",dept:"Surgery",type:"positive",msg:"Interesting timing — we're actually evaluating new vendors. Can you send clinical data?",time:"Yesterday",approved:false},
  {id:4,doctor:"Dr. Robert Torres",dept:"Surgery",type:"hard_no",msg:"Please remove me from your list.",time:"Yesterday",approved:false},
];

const SPECIALTIES=[
  {label:"Orthopedic Surgery",value:"Orthopaedic Surgery"},
  {label:"Sports Medicine",value:"Sports Medicine"},
  {label:"Hand Surgery",value:"Hand Surgery"},
  {label:"Neurosurgery",value:"Neurological Surgery"},
  {label:"General Surgery",value:"Surgery"},
  {label:"Cardiology",value:"Cardiovascular Disease"},
  {label:"Radiology",value:"Diagnostic Radiology"},
  {label:"Physical Medicine",value:"Physical Medicine & Rehabilitation"},
  {label:"Anesthesiology",value:"Anesthesiology"},
  {label:"Emergency Medicine",value:"Emergency Medicine"},
];

const DEPTS=["All","Surgery","Materials Management","Nursing","Administration","Pharmacy","Radiology"];
const STATES=["AL","AK","AZ","AR","CA","CO","CT","DE","FL","GA","HI","ID","IL","IN","IA","KS","KY","LA","ME","MD","MA","MI","MN","MS","MO","MT","NE","NV","NH","NJ","NM","NY","NC","ND","OH","OK","OR","PA","RI","SC","SD","TN","TX","UT","VT","VA","WA","WV","WI","WY"];

const DC=(d)=>({"Surgery":"#0d9488","Materials Management":"#7c3aed","Nursing":"#059669","Administration":"#d97706","Pharmacy":"#db2777","Radiology":"#0284c7"}[d]||"#64748b");
const DCLight=(d)=>({"Surgery":"#f0fdfa","Materials Management":"#f5f3ff","Nursing":"#ecfdf5","Administration":"#fffbeb","Pharmacy":"#fdf2f8","Radiology":"#f0f9ff"}[d]||"#f8fafc");

const TEAL="#0d9488";
const TEAL_DARK="#0f766e";
const TEAL_LIGHT="#f0fdfa";

function Badge({children, color="#0d9488", bg="#f0fdfa"}){
  return <span style={{fontSize:"11px",fontWeight:600,padding:"2px 8px",borderRadius:"20px",background:bg,color,border:`1px solid ${color}22`,display:"inline-block",letterSpacing:"0.02em"}}>{children}</span>;
}

function StatusBadge({status}){
  const map={hot:{color:"#dc2626",bg:"#fef2f2",label:"Hot"},warm:{color:"#d97706",bg:"#fffbeb",label:"Warm"},contacted:{color:"#64748b",bg:"#f8fafc",label:"Contacted"},new:{color:"#0284c7",bg:"#f0f9ff",label:"New"}};
  const s=map[status]||map.new;
  return <Badge color={s.color} bg={s.bg}>{s.label}</Badge>;
}

function ScorePill({score}){
  if(!score) return <span style={{color:"#94a3b8",fontSize:"13px"}}>—</span>;
  const color=score>=8?"#059669":score>=6?"#d97706":"#dc2626";
  const bg=score>=8?"#ecfdf5":score>=6?"#fffbeb":"#fef2f2";
  return <span style={{fontWeight:700,fontSize:"15px",color,background:bg,padding:"2px 10px",borderRadius:"8px"}}>{score}<span style={{fontSize:"11px",fontWeight:500,opacity:0.7}}>/10</span></span>;
}

function Card({children, style={}}){
  return <div style={{background:"white",border:"1px solid #e8edf2",borderRadius:"12px",padding:"20px",...style}}>{children}</div>;
}

function Btn({children, onClick, variant="primary", style={}, disabled=false}){
  const variants={
    primary:{background:TEAL,color:"white",border:"none"},
    secondary:{background:"white",color:"#374151",border:"1px solid #d1d5db"},
    ghost:{background:"transparent",color:TEAL,border:`1px solid ${TEAL}33`},
    danger:{background:"#fef2f2",color:"#dc2626",border:"1px solid #fca5a5"},
  };
  return <button onClick={onClick} disabled={disabled} style={{...variants[variant],borderRadius:"8px",padding:"8px 16px",fontWeight:600,fontSize:"13px",cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.6:1,transition:"all 0.15s",...style}}>{children}</button>;
}

function Input({label, value, onChange, placeholder, type="text", style={}}){
  return <div style={{marginBottom:"14px",...style}}>
    {label&&<label style={{display:"block",fontSize:"12px",fontWeight:600,color:"#64748b",marginBottom:"5px",letterSpacing:"0.04em",textTransform:"uppercase"}}>{label}</label>}
    <input type={type} value={value} onChange={onChange} placeholder={placeholder} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923",background:"white",transition:"border-color 0.15s"}} onFocus={e=>e.target.style.borderColor=TEAL} onBlur={e=>e.target.style.borderColor="#e2e8f0"}/>
  </div>;
}

function Select({label, value, onChange, children, style={}}){
  return <div style={{marginBottom:"14px",...style}}>
    {label&&<label style={{display:"block",fontSize:"12px",fontWeight:600,color:"#64748b",marginBottom:"5px",letterSpacing:"0.04em",textTransform:"uppercase"}}>{label}</label>}
    <select value={value} onChange={onChange} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923",background:"white",cursor:"pointer"}} onFocus={e=>e.target.style.borderColor=TEAL} onBlur={e=>e.target.style.borderColor="#e2e8f0"}>{children}</select>
  </div>;
}

function Sidebar({tab, setTab, pending, company}){
  const nav=[
    {id:"dashboard",icon:"▦",label:"Dashboard"},
    {id:"pipeline",icon:"◈",label:"Pipeline"},
    {id:"search",icon:"⊙",label:"Find Providers"},
    {id:"replies",icon:"◇",label:"Replies",badge:pending},
    {id:"outreach",icon:"◉",label:"Outreach"},
  ];
  return(
    <div style={{width:"220px",flexShrink:0,background:"white",borderRight:"1px solid #e8edf2",display:"flex",flexDirection:"column",position:"fixed",top:0,bottom:0,left:0,zIndex:100}}>
      <div style={{padding:"20px 18px 16px",borderBottom:"1px solid #f1f5f9"}}>
        <div style={{display:"flex",alignItems:"center",gap:"9px",marginBottom:"4px"}}>
          <div style={{width:"30px",height:"30px",background:TEAL,borderRadius:"8px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <span style={{color:"white",fontSize:"14px",fontWeight:700}}>P</span>
          </div>
          <span style={{fontWeight:700,fontSize:"16px",color:"#0f1923",letterSpacing:"-0.3px"}}>ProviderPath</span>
        </div>
        <div style={{fontSize:"11px",color:"#94a3b8",paddingLeft:"39px"}}>{company}</div>
      </div>
      <nav style={{flex:1,padding:"10px 10px"}}>
        {nav.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{display:"flex",alignItems:"center",gap:"9px",width:"100%",padding:"9px 12px",background:tab===t.id?TEAL_LIGHT:"transparent",border:"none",borderRadius:"8px",color:tab===t.id?TEAL:"#64748b",fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:"13px",fontWeight:tab===t.id?600:500,cursor:"pointer",textAlign:"left",marginBottom:"2px",transition:"all 0.15s"}}>
            <span style={{fontSize:"14px",opacity:0.8}}>{t.icon}</span>
            {t.label}
            {t.badge>0&&<span style={{marginLeft:"auto",background:TEAL,color:"white",borderRadius:"10px",padding:"1px 7px",fontSize:"10px",fontWeight:700}}>{t.badge}</span>}
          </button>
        ))}
      </nav>
      <div style={{padding:"14px 18px",borderTop:"1px solid #f1f5f9"}}>
        <div style={{fontSize:"12px",color:"#94a3b8",marginBottom:"8px"}}>Signed in as</div>
        <div style={{fontSize:"13px",fontWeight:600,color:"#374151"}}>{DEMO.rep}</div>
      </div>
    </div>
  );
}

function StatCard({label,value,sub,color=TEAL,icon}){
  return(
    <Card>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"12px"}}>
        <span style={{fontSize:"12px",fontWeight:600,color:"#94a3b8",letterSpacing:"0.04em",textTransform:"uppercase"}}>{label}</span>
        <span style={{fontSize:"18px",opacity:0.4}}>{icon}</span>
      </div>
      <div style={{fontFamily:"'Instrument Serif',serif",fontSize:"36px",color,lineHeight:1,marginBottom:"6px"}}>{value}</div>
      {sub&&<div style={{fontSize:"12px",color:"#94a3b8"}}>{sub}</div>}
    </Card>
  );
}

function App(){
  const [page,setPage]=useState("login");
  const [tab,setTab]=useState("dashboard");
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [loginErr,setLoginErr]=useState("");
  const [leads,setLeads]=useState(LEADS);
  const [replies,setReplies]=useState(REPLIES_INIT);
  const [dept,setDept]=useState("All");
  const [sState,setSState]=useState("TX");
  const [sCity,setSCity]=useState("");
  const [sSpec,setSSpec]=useState("Orthopaedic Surgery");
  const [sLimit,setSLimit]=useState("20");
  const [sResults,setSResults]=useState([]);
  const [searching,setSearching]=useState(false);
  const [searchErr,setSearchErr]=useState("");
  const [aiTexts,setAiTexts]=useState({});
  const [aiLoad,setAiLoad]=useState({});
  const [notif,setNotif]=useState(null);
  const [selLead,setSelLead]=useState(null);
  const [noteText,setNoteText]=useState({});

  const showNotif=(m,type="success")=>{setNotif({m,type});setTimeout(()=>setNotif(null),3000)};

  const callClaude=async(prompt,key)=>{
    setAiLoad(p=>({...p,[key]:true}));
    try{
      // Call our own Vercel serverless function — no CORS issues
      const res=await fetch("/api/claude",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({prompt,max_tokens:400})
      });
      const data=await res.json();
      const text=data.content?.map(c=>c.text||"").join("")||data.error||"No response";
      setAiTexts(p=>({...p,[key]:text}));
    }catch(e){setAiTexts(p=>({...p,[key]:"AI unavailable. Check API key in Vercel settings."}))}
    setAiLoad(p=>({...p,[key]:false}));
  };

  const doSearch=async()=>{
    setSearching(true);setSResults([]);setSearchErr("");
    try{
      const params=new URLSearchParams({taxonomy:sSpec,state:sState,limit:sLimit});
      if(sCity.trim()) params.set("city",sCity.trim());
      const res=await fetch("/api/npi?"+params);
      const data=await res.json();
      const results=(data.results||[]).map(r=>{
        const a=(r.addresses||[]).find(x=>x.address_purpose==="LOCATION")||r.addresses?.[0]||{};
        const b=r.basic||{};
        const name=b.organizational_name||[b.name_prefix,b.first_name,b.middle_name,b.last_name].filter(Boolean).join(" ")||"Unknown";
        const orgName=a.organization_name||"";
        const locationLabel=orgName||(a.address_1?a.address_1+(a.city?", "+a.city:""):"Private Practice");
        return{id:r.number,npi:r.number,name,spec:r.taxonomies?.[0]?.desc||sSpec,hospital:locationLabel,isPractice:!orgName,city:a.city||"",state:a.state||sState,phone:a.telephone_number||"N/A",dept:"Surgery",score:null,status:"new",notes:"",lastContact:"Never"};
      });
      if(!results.length) setSearchErr("No results found. Try removing the city filter or selecting a different state.");
      setSResults(results);
    }catch(e){
      setSearchErr("Search failed. Please check your connection.");
    }
    setSearching(false);
  };

  const saveNote=(id,note)=>{
    setLeads(p=>p.map(l=>l.id===id?{...l,notes:note}:l));
    showNotif("Note saved");
  };

  const filtered=dept==="All"?leads:leads.filter(l=>l.dept===dept);
  const pending=replies.filter(r=>!r.approved&&r.type!=="hard_no").length;
  const hotLeads=leads.filter(l=>l.status==="hot");

  const login=()=>{
    if(email===DEMO.email&&password===DEMO.password){setPage("app");setLoginErr("");}
    else setLoginErr("Invalid credentials. Use demo@acmedevices.com / demo123");
  };

  if(page==="login") return(
    <div style={{minHeight:"100vh",display:"flex",background:"#f5f6f8"}}>
      <div style={{width:"50%",background:TEAL,display:"flex",flexDirection:"column",justifyContent:"center",padding:"60px"}}>
        <div style={{fontFamily:"'Instrument Serif',serif",fontSize:"48px",color:"white",lineHeight:1.1,marginBottom:"24px"}}>The smarter way to sell medical devices.</div>
        <p style={{color:"rgba(255,255,255,0.75)",fontSize:"16px",lineHeight:1.7,maxWidth:"380px"}}>ProviderPath combines AI-powered lead intelligence, automated outreach, and reply management — built specifically for medical device sales teams.</p>
        <div style={{marginTop:"48px",display:"flex",flexDirection:"column",gap:"16px"}}>
          {["Find 900,000+ licensed providers by specialty & location","AI scores and prioritizes leads for your device","Auto-generate personalized outreach for every contact","Manage replies and route warm leads to your reps"].map(f=>(
            <div key={f} style={{display:"flex",alignItems:"center",gap:"12px"}}>
              <div style={{width:"20px",height:"20px",borderRadius:"50%",background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{color:"white",fontSize:"11px"}}>✓</span>
              </div>
              <span style={{color:"rgba(255,255,255,0.85)",fontSize:"14px"}}>{f}</span>
            </div>
          ))}
        </div>
      </div>
      <div style={{width:"50%",display:"flex",alignItems:"center",justifyContent:"center",padding:"60px"}}>
        <div style={{width:"100%",maxWidth:"380px"}}>
          <div style={{marginBottom:"36px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"}}>
              <div style={{width:"32px",height:"32px",background:TEAL,borderRadius:"8px",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"white",fontWeight:700,fontSize:"16px"}}>P</span></div>
              <span style={{fontWeight:700,fontSize:"20px",color:"#0f1923"}}>ProviderPath</span>
            </div>
            <h1 style={{fontSize:"24px",fontWeight:700,color:"#0f1923",marginBottom:"6px"}}>Sign in to your account</h1>
            <p style={{color:"#64748b",fontSize:"14px"}}>Access your sales intelligence dashboard</p>
          </div>
          <Input label="Email address" value={email} onChange={e=>setEmail(e.target.value)} placeholder="demo@acmedevices.com"/>
          <Input label="Password" type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••"/>
          {loginErr&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:"8px",padding:"10px 12px",marginBottom:"14px",color:"#dc2626",fontSize:"13px"}}>{loginErr}</div>}
          <button onClick={login} style={{width:"100%",background:TEAL,border:"none",borderRadius:"8px",padding:"12px",color:"white",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:"15px",cursor:"pointer",marginBottom:"16px"}}>Sign in →</button>
          <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"12px",fontSize:"12px",color:"#64748b",lineHeight:1.7}}>
            <strong style={{color:"#374151"}}>Demo credentials:</strong><br/>
            Email: demo@acmedevices.com<br/>
            Password: demo123
          </div>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{display:"flex",minHeight:"100vh",background:"#f5f6f8"}}>
      {notif&&(
        <div className="fade-in" style={{position:"fixed",top:"20px",right:"20px",background:notif.type==="error"?"#fef2f2":"white",border:`1px solid ${notif.type==="error"?"#fca5a5":"#bbf7d0"}`,borderRadius:"10px",padding:"12px 18px",color:notif.type==="error"?"#dc2626":"#059669",fontSize:"13px",fontWeight:500,zIndex:999,boxShadow:"0 4px 12px rgba(0,0,0,0.08)"}}>
          {notif.type==="error"?"⚠ ":"✓ "}{notif.m}
        </div>
      )}

      <Sidebar tab={tab} setTab={setTab} pending={pending} company={DEMO.company}/>

      <div style={{marginLeft:"220px",flex:1,padding:"28px 32px",minHeight:"100vh"}}>

        {/* DASHBOARD */}
        {tab==="dashboard"&&(
          <div className="fade-in">
            <div style={{marginBottom:"28px"}}>
              <h1 style={{fontFamily:"'Instrument Serif',serif",fontSize:"30px",color:"#0f1923",margin:"0 0 4px"}}>Good morning, {DEMO.rep} 👋</h1>
              <p style={{color:"#64748b",fontSize:"14px"}}>Here's your pipeline for {new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</p>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"14px",marginBottom:"24px"}}>
              <StatCard label="Total Leads" value={leads.length} sub="in your pipeline" color={TEAL} icon="◈"/>
              <StatCard label="Hot Leads" value={hotLeads.length} sub="need follow-up now" color="#dc2626" icon="🔥"/>
              <StatCard label="Meetings Booked" value={3} sub="this month" color="#d97706" icon="📅"/>
              <StatCard label="Positive Replies" value={replies.filter(r=>r.type==="positive").length} sub="awaiting response" color="#7c3aed" icon="💬"/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px",marginBottom:"16px"}}>
              <Card>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
                  <h3 style={{fontSize:"15px",fontWeight:700,color:"#0f1923"}}>🔥 Hot Leads</h3>
                  <button onClick={()=>setTab("pipeline")} style={{fontSize:"12px",color:TEAL,background:"none",border:"none",cursor:"pointer",fontWeight:600}}>View all →</button>
                </div>
                {hotLeads.map(l=>(
                  <div key={l.id} onClick={()=>{setSelLead(l.id);setTab("pipeline")}} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid #f1f5f9",cursor:"pointer"}}>
                    <div>
                      <p style={{margin:"0 0 3px",fontWeight:600,fontSize:"13px",color:"#0f1923"}}>{l.name}</p>
                      <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                        <Badge color={DC(l.dept)} bg={DCLight(l.dept)}>{l.dept}</Badge>
                        <span style={{fontSize:"11px",color:"#94a3b8"}}>{l.lastContact}</span>
                      </div>
                    </div>
                    <ScorePill score={l.score}/>
                  </div>
                ))}
              </Card>
              <Card>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
                  <h3 style={{fontSize:"15px",fontWeight:700,color:"#0f1923"}}>💬 Recent Replies</h3>
                  <button onClick={()=>setTab("replies")} style={{fontSize:"12px",color:TEAL,background:"none",border:"none",cursor:"pointer",fontWeight:600}}>Manage →</button>
                </div>
                {replies.slice(0,4).map(r=>{
                  const tc=r.type==="positive"?"#059669":r.type==="objection"?"#d97706":"#dc2626";
                  const tbg=r.type==="positive"?"#ecfdf5":r.type==="objection"?"#fffbeb":"#fef2f2";
                  return(<div key={r.id} onClick={()=>setTab("replies")} style={{padding:"10px 0",borderBottom:"1px solid #f1f5f9",cursor:"pointer"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}}>
                      <span style={{fontWeight:600,fontSize:"13px",color:"#0f1923"}}>{r.doctor}</span>
                      <Badge color={tc} bg={tbg}>{r.type.replace("_"," ")}</Badge>
                    </div>
                    <p style={{margin:0,color:"#64748b",fontSize:"12px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.msg}</p>
                  </div>);
                })}
              </Card>
            </div>
            <Card>
              <h3 style={{fontSize:"15px",fontWeight:700,color:"#0f1923",marginBottom:"16px"}}>Pipeline by Department</h3>
              <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:"10px"}}>
                {["Surgery","Materials Management","Nursing","Administration","Pharmacy","Radiology"].map(d=>(
                  <div key={d} onClick={()=>{setDept(d);setTab("pipeline")}} style={{background:DCLight(d),border:`1px solid ${DC(d)}22`,borderRadius:"10px",padding:"14px",cursor:"pointer",textAlign:"center",transition:"transform 0.15s"}} onMouseOver={e=>e.currentTarget.style.transform="translateY(-2px)"} onMouseOut={e=>e.currentTarget.style.transform="translateY(0)"}>
                    <div style={{fontFamily:"'Instrument Serif',serif",fontSize:"28px",color:DC(d),marginBottom:"4px"}}>{leads.filter(l=>l.dept===d).length}</div>
                    <div style={{fontSize:"11px",fontWeight:600,color:DC(d),lineHeight:1.3}}>{d}</div>
                  </div>
                ))}
              </div>
            </Card>
          </div>
        )}

        {/* PIPELINE */}
        {tab==="pipeline"&&(
          <div className="fade-in">
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"20px"}}>
              <div>
                <h1 style={{fontFamily:"'Instrument Serif',serif",fontSize:"30px",color:"#0f1923",margin:"0 0 4px"}}>Lead Pipeline</h1>
                <p style={{color:"#64748b",fontSize:"14px"}}>{filtered.length} contacts · click any row to expand</p>
              </div>
              <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                {DEPTS.map(d=>(
                  <button key={d} onClick={()=>setDept(d)} style={{fontSize:"12px",padding:"5px 12px",borderRadius:"20px",border:`1px solid ${dept===d?DC(d):"#e2e8f0"}`,background:dept===d?DCLight(d):"white",color:dept===d?DC(d):"#64748b",cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:dept===d?600:500,transition:"all 0.15s"}}>
                    {d}{d!=="All"?` · ${leads.filter(l=>l.dept===d).length}`:""}
                  </button>
                ))}
              </div>
            </div>
            <Card style={{padding:0,overflow:"hidden"}}>
              <div style={{display:"grid",gridTemplateColumns:"2fr 1.3fr 1fr 0.7fr 0.7fr 0.8fr 1.5fr",padding:"10px 18px",background:"#f8fafc",borderBottom:"1px solid #e8edf2",color:"#94a3b8",fontSize:"11px",fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase"}}>
                <span>Contact</span><span>Hospital</span><span>Department</span><span>State</span><span>Score</span><span>Status</span><span>Actions</span>
              </div>
              {filtered.map(l=>{
                const sk="score_"+l.id,ek="email_"+l.id;
                const isExp=selLead===l.id;
                return(<div key={l.id} style={{borderBottom:"1px solid #f1f5f9"}}>
                  <div onClick={()=>setSelLead(isExp?null:l.id)} style={{display:"grid",gridTemplateColumns:"2fr 1.3fr 1fr 0.7fr 0.7fr 0.8fr 1.5fr",padding:"13px 18px",cursor:"pointer",background:isExp?TEAL_LIGHT:"white",alignItems:"center",transition:"background 0.15s"}} onMouseOver={e=>{if(!isExp)e.currentTarget.style.background="#f8fafc"}} onMouseOut={e=>{if(!isExp)e.currentTarget.style.background="white"}}>
                    <div>
                      <p style={{margin:"0 0 2px",fontWeight:600,fontSize:"13px",color:"#0f1923"}}>{l.name}</p>
                      <p style={{margin:0,color:"#94a3b8",fontSize:"11px"}}>{l.spec}</p>
                    </div>
                    <p style={{margin:0,color:"#64748b",fontSize:"12px"}}>{l.hospital}</p>
                    <Badge color={DC(l.dept)} bg={DCLight(l.dept)}>{l.dept}</Badge>
                    <p style={{margin:0,color:"#64748b",fontSize:"12px"}}>{l.state}</p>
                    <ScorePill score={l.score}/>
                    <StatusBadge status={l.status}/>
                    <div style={{display:"flex",gap:"6px"}} onClick={e=>e.stopPropagation()}>
                      <Btn variant="ghost" style={{padding:"5px 10px",fontSize:"11px"}} onClick={()=>callClaude(`Score this medical device sales lead 1-10 with 2 sentence reasoning. Name: ${l.name}, Role: ${l.spec}, Dept: ${l.dept}, Hospital: ${l.hospital}, Location: ${l.city} ${l.state}. Format: SCORE: X/10\nREASON: [reason]`,sk)}>{aiLoad[sk]?"...":"Score"}</Btn>
                      <Btn variant="secondary" style={{padding:"5px 10px",fontSize:"11px",color:TEAL}} onClick={()=>{callClaude(`Write a personalized cold outreach email under 90 words to ${l.name}, ${l.spec} in ${l.dept} at ${l.hospital} in ${l.city}, ${l.state}. We sell orthopedic implants. Professional, warm, not salesy. Email body only.`,ek);setSelLead(l.id)}}>{aiLoad[ek]?"...":"Draft Email"}</Btn>
                    </div>
                  </div>
                  {isExp&&(
                    <div style={{padding:"16px 18px 20px",background:TEAL_LIGHT,borderTop:"1px solid #ccfbf1"}}>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"14px"}}>
                        <div style={{background:"white",borderRadius:"10px",padding:"14px",border:"1px solid #e8edf2"}}>
                          <p style={{color:"#94a3b8",fontSize:"11px",fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",margin:"0 0 10px"}}>Contact Info</p>
                          <p style={{color:"#374151",fontSize:"13px",margin:"0 0 4px"}}>📞 {l.phone||"Not available"}</p>
                          <p style={{color:"#374151",fontSize:"13px",margin:"0 0 4px"}}>📍 {l.city}, {l.state}</p>
                          {l.npi&&<p style={{color:"#94a3b8",fontSize:"11px",margin:0}}>NPI: {l.npi}</p>}
                        </div>
                        <div style={{background:"white",borderRadius:"10px",padding:"14px",border:"1px solid #e8edf2"}}>
                          <p style={{color:"#94a3b8",fontSize:"11px",fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",margin:"0 0 10px"}}>Notes</p>
                          <textarea value={noteText[l.id]!==undefined?noteText[l.id]:l.notes} onChange={e=>setNoteText(p=>({...p,[l.id]:e.target.value}))} placeholder="Add notes about this contact..." style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"6px",padding:"8px",fontSize:"12px",color:"#374151",resize:"none",height:"64px",fontFamily:"'Plus Jakarta Sans',sans-serif"}}/>
                          <Btn variant="ghost" style={{padding:"4px 10px",fontSize:"11px",marginTop:"6px"}} onClick={()=>saveNote(l.id,noteText[l.id]||"")}>Save Note</Btn>
                        </div>
                        <div style={{background:"white",borderRadius:"10px",padding:"14px",border:"1px solid #e8edf2",gridColumn:aiTexts[sk]||aiTexts[ek]?"span 1":"span 1"}}>
                          <p style={{color:"#94a3b8",fontSize:"11px",fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",margin:"0 0 10px"}}>{aiTexts[ek]?"AI Draft Email":aiTexts[sk]?"AI Score":"AI Output"}</p>
                          {!aiTexts[sk]&&!aiTexts[ek]&&!aiLoad[sk]&&!aiLoad[ek]&&<p style={{color:"#94a3b8",fontSize:"12px"}}>Click Score or Draft Email above to generate AI content for this contact.</p>}
                          {(aiLoad[sk]||aiLoad[ek])&&<div style={{display:"flex",gap:"4px",alignItems:"center",padding:"8px 0"}}>{[1,2,3].map(i=><div key={i} className="loading-dot" style={{width:"6px",height:"6px",borderRadius:"50%",background:TEAL}}/>)}</div>}
                          {aiTexts[sk]&&!aiTexts[ek]&&<p style={{color:"#374151",fontSize:"12px",lineHeight:1.6,margin:0,whiteSpace:"pre-line"}}>{aiTexts[sk]}</p>}
                          {aiTexts[ek]&&<p style={{color:"#374151",fontSize:"12px",lineHeight:1.6,margin:0}}>{aiTexts[ek]}</p>}
                        </div>
                      </div>
                    </div>
                  )}
                </div>);
              })}
              {filtered.length===0&&<div style={{padding:"48px",textAlign:"center",color:"#94a3b8",fontSize:"14px"}}>No leads in this department yet.<br/><button onClick={()=>setTab("search")} style={{color:TEAL,background:"none",border:"none",cursor:"pointer",fontWeight:600,fontSize:"14px",marginTop:"8px"}}>Search for providers →</button></div>}
            </Card>
          </div>
        )}

        {/* FIND PROVIDERS */}
        {tab==="search"&&(
          <div className="fade-in">
            <div style={{marginBottom:"24px"}}>
              <h1 style={{fontFamily:"'Instrument Serif',serif",fontSize:"30px",color:"#0f1923",margin:"0 0 4px"}}>Find Providers</h1>
              <p style={{color:"#64748b",fontSize:"14px"}}>Search 900,000+ licensed healthcare providers from the NPI Registry</p>
            </div>
            <Card style={{marginBottom:"16px"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:"16px",marginBottom:"16px"}}>
                <Select label="Specialty" value={sSpec} onChange={e=>setSSpec(e.target.value)}>
                  {SPECIALTIES.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}
                </Select>
                <Select label="State" value={sState} onChange={e=>setSState(e.target.value)}>
                  {STATES.map(s=><option key={s}>{s}</option>)}
                </Select>
                <Input label="City (optional)" value={sCity} onChange={e=>setSCity(e.target.value)} placeholder="Leave blank for all cities" style={{marginBottom:0}}/>
                <Select label="Results" value={sLimit} onChange={e=>setSLimit(e.target.value)}>
                  <option value="10">10 results</option>
                  <option value="20">20 results</option>
                  <option value="50">50 results</option>
                  <option value="100">100 results</option>
                </Select>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
                <Btn onClick={()=>!searching&&doSearch()} style={{padding:"10px 28px",fontSize:"14px"}}>{searching?"Searching...":"Search Providers →"}</Btn>
                <span style={{fontSize:"12px",color:"#94a3b8"}}>💡 Leave city blank for best results</span>
              </div>
            </Card>

            {searching&&(
              <Card style={{textAlign:"center",padding:"40px"}}>
                <div style={{display:"flex",gap:"6px",justifyContent:"center",marginBottom:"12px"}}>{[1,2,3].map(i=><div key={i} className="loading-dot" style={{width:"8px",height:"8px",borderRadius:"50%",background:TEAL}}/>)}</div>
                <p style={{color:"#64748b",fontSize:"14px",margin:0}}>Searching NPI Registry...</p>
              </Card>
            )}

            {searchErr&&!searching&&(
              <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:"10px",padding:"14px 18px",marginBottom:"14px"}}>
                <p style={{color:"#92400e",fontSize:"13px",fontWeight:600,margin:"0 0 4px"}}>⚠ {searchErr}</p>
                <p style={{color:"#b45309",fontSize:"12px",margin:0}}>Try removing the city filter, or select TX, CA, or FL for the most results.</p>
              </div>
            )}

            {sResults.length>0&&!searching&&(
              <Card style={{padding:0,overflow:"hidden"}}>
                <div style={{padding:"14px 18px",borderBottom:"1px solid #f1f5f9",display:"flex",justifyContent:"space-between",alignItems:"center",background:"#f8fafc"}}>
                  <span style={{fontWeight:700,fontSize:"15px",color:"#0f1923"}}>✓ {sResults.length} providers found</span>
                  <span style={{fontSize:"12px",color:"#94a3b8"}}>Live NPI Registry · Federal data</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"2fr 1.5fr 1fr 0.8fr 0.8fr 1fr",padding:"10px 18px",background:"#f8fafc",borderBottom:"1px solid #e8edf2",color:"#94a3b8",fontSize:"11px",fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase"}}>
                  <span>Provider</span><span>Location/Org</span><span>City</span><span>State</span><span>Type</span><span>Action</span>
                </div>
                {sResults.map((l,i)=>(
                  <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1.5fr 1fr 0.8fr 0.8fr 1fr",padding:"13px 18px",borderBottom:"1px solid #f1f5f9",alignItems:"center",background:"white"}}>
                    <div>
                      <p style={{margin:"0 0 2px",fontWeight:600,fontSize:"13px",color:"#0f1923"}}>{l.name}</p>
                      <p style={{margin:0,color:"#94a3b8",fontSize:"11px"}}>{l.spec} · NPI {l.npi}</p>
                    </div>
                    <p style={{margin:0,color:"#64748b",fontSize:"12px"}}>{l.hospital}</p>
                    <p style={{margin:0,color:"#64748b",fontSize:"12px"}}>{l.city||"—"}</p>
                    <p style={{margin:0,color:"#64748b",fontSize:"12px"}}>{l.state}</p>
                    <Badge color={l.isPractice?"#d97706":"#0d9488"} bg={l.isPractice?"#fffbeb":"#f0fdfa"}>{l.isPractice?"Private":"Hospital"}</Badge>
                    <Btn variant="ghost" style={{padding:"5px 12px",fontSize:"12px",justifySelf:"start"}} onClick={()=>{setLeads(p=>[...p,{...l,id:Date.now()+i,score:Math.floor(Math.random()*4)+6,status:"contacted",lastContact:"Just added"}]);showNotif(`${l.name} added to pipeline!`)}}>+ Add to Pipeline</Btn>
                  </div>
                ))}
              </Card>
            )}
          </div>
        )}

        {/* REPLIES */}
        {tab==="replies"&&(
          <div className="fade-in">
            <div style={{marginBottom:"24px"}}>
              <h1 style={{fontFamily:"'Instrument Serif',serif",fontSize:"30px",color:"#0f1923",margin:"0 0 4px"}}>Reply Management</h1>
              <p style={{color:"#64748b",fontSize:"14px"}}>AI classifies responses and drafts replies — you approve before sending</p>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
              {replies.map(r=>{
                const rk="reply_"+r.id;
                const typeMap={positive:{color:"#059669",bg:"#ecfdf5",label:"Positive"},objection:{color:"#d97706",bg:"#fffbeb",label:"Objection"},hard_no:{color:"#dc2626",bg:"#fef2f2",label:"Hard No"}};
                const t=typeMap[r.type]||typeMap.objection;
                return(
                  <Card key={r.id} style={{opacity:r.approved?0.6:1}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                        <div style={{width:"36px",height:"36px",borderRadius:"50%",background:TEAL_LIGHT,display:"flex",alignItems:"center",justifyContent:"center",color:TEAL,fontWeight:700,fontSize:"14px"}}>{r.doctor.split(" ").pop()[0]}</div>
                        <div>
                          <p style={{margin:"0 0 2px",fontWeight:700,fontSize:"14px",color:"#0f1923"}}>{r.doctor}</p>
                          <Badge color={DC(r.dept)} bg={DCLight(r.dept)}>{r.dept}</Badge>
                        </div>
                        <Badge color={t.color} bg={t.bg}>{t.label}</Badge>
                        {r.approved&&<Badge color="#059669" bg="#ecfdf5">✓ Sent</Badge>}
                      </div>
                      <span style={{fontSize:"12px",color:"#94a3b8"}}>{r.time}</span>
                    </div>
                    <div style={{background:"#f8fafc",border:"1px solid #e8edf2",borderRadius:"8px",padding:"12px",marginBottom:"14px"}}>
                      <p style={{color:"#94a3b8",fontSize:"11px",fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",margin:"0 0 6px"}}>Their Message</p>
                      <p style={{color:"#374151",margin:0,fontSize:"13px",lineHeight:1.6}}>{r.msg}</p>
                    </div>
                    {r.type==="hard_no"&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:"8px",padding:"10px 14px",color:"#dc2626",fontSize:"13px"}}>✗ Removed from all sequences and marked Do Not Contact</div>}
                    {r.type!=="hard_no"&&!r.approved&&(
                      <div>
                        {!aiTexts[rk]&&!aiLoad[rk]&&<Btn variant="ghost" onClick={()=>callClaude(r.type==="positive"?`Draft a warm, professional reply to this positive response: "${r.msg}". Under 80 words. Suggest a 15-minute call with a calendar link placeholder. Friendly but professional.`:`Draft a tactful, empathetic response to this sales objection: "${r.msg}". Under 70 words. Acknowledge their situation and keep the door open for future contact.`,rk)}>⟳ Generate AI Response</Btn>}
                        {aiLoad[rk]&&<div style={{display:"flex",gap:"4px",alignItems:"center",padding:"8px 0"}}>{[1,2,3].map(i=><div key={i} className="loading-dot" style={{width:"6px",height:"6px",borderRadius:"50%",background:TEAL}}/>)}<span style={{color:"#64748b",fontSize:"13px",marginLeft:"8px"}}>Drafting response...</span></div>}
                        {aiTexts[rk]&&(
                          <div>
                            <div style={{background:TEAL_LIGHT,border:`1px solid ${TEAL}22`,borderRadius:"8px",padding:"14px",marginBottom:"12px"}}>
                              <p style={{color:"#94a3b8",fontSize:"11px",fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",margin:"0 0 8px"}}>AI Drafted Response</p>
                              <p style={{color:"#0f1923",margin:0,fontSize:"13px",lineHeight:1.7}}>{aiTexts[rk]}</p>
                            </div>
                            <div style={{display:"flex",gap:"8px"}}>
                              <Btn onClick={()=>{setReplies(p=>p.map(x=>x.id===r.id?{...x,approved:true}:x));showNotif("Reply approved and queued to send!")}}>✓ Approve & Send</Btn>
                              <Btn variant="secondary" onClick={()=>callClaude(`Rewrite this reply with a different angle, same goal: "${aiTexts[rk]}"`,rk)}>↺ Regenerate</Btn>
                            </div>
                          </div>
                        )}
                      </div>
                    )}
                  </Card>
                );
              })}
            </div>
          </div>
        )}

        {/* OUTREACH */}
        {tab==="outreach"&&(
          <div className="fade-in">
            <div style={{marginBottom:"24px"}}>
              <h1 style={{fontFamily:"'Instrument Serif',serif",fontSize:"30px",color:"#0f1923",margin:"0 0 4px"}}>Outreach Sequences</h1>
              <p style={{color:"#64748b",fontSize:"14px"}}>Active automated campaigns across your target accounts</p>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px",marginBottom:"16px"}}>
              {[{name:"Texas Orthopedic Surgeons",status:"Active",sent:148,opens:62,replies:8,meetings:2,specialty:"Orthopedic Surgery"},{name:"Materials Management — TX",status:"Active",sent:95,opens:41,replies:6,meetings:1,specialty:"Materials Management"},{name:"OR Nursing Leadership",status:"Active",sent:67,opens:28,replies:5,meetings:1,specialty:"Nursing"},{name:"Arizona Sports Medicine",status:"Paused",sent:73,opens:31,replies:4,meetings:1,specialty:"Sports Medicine"}].map(s=>(
                <Card key={s.name}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"16px"}}>
                    <div>
                      <p style={{margin:"0 0 6px",fontWeight:700,fontSize:"14px",color:"#0f1923"}}>{s.name}</p>
                      <Badge color={DC(s.specialty)} bg={DCLight(s.specialty)}>{s.specialty}</Badge>
                    </div>
                    <Badge color={s.status==="Active"?"#059669":"#94a3b8"} bg={s.status==="Active"?"#ecfdf5":"#f8fafc"}>{s.status}</Badge>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",textAlign:"center",gap:"8px",marginBottom:"14px"}}>
                    {[["Sent",s.sent,"#64748b"],["Opens",s.opens,TEAL],["Replies",s.replies,"#d97706"],["Meetings",s.meetings,"#dc2626"]].map(([l,v,c])=>(
                      <div key={l} style={{background:"#f8fafc",borderRadius:"8px",padding:"10px 4px"}}>
                        <div style={{fontFamily:"'Instrument Serif',serif",fontSize:"24px",color:c,lineHeight:1}}>{v}</div>
                        <div style={{color:"#94a3b8",fontSize:"11px",marginTop:"2px"}}>{l}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{background:"#f1f5f9",borderRadius:"4px",height:"4px",overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${Math.round(s.opens/s.sent*100)}%`,background:TEAL,borderRadius:"4px",transition:"width 0.5s ease"}}/>
                  </div>
                  <p style={{color:"#94a3b8",fontSize:"11px",margin:"6px 0 0"}}>{Math.round(s.opens/s.sent*100)}% open rate</p>
                </Card>
              ))}
            </div>
            <Card style={{textAlign:"center",padding:"32px",border:`1px solid ${TEAL}22`,background:TEAL_LIGHT}}>
              <p style={{fontFamily:"'Instrument Serif',serif",fontSize:"22px",color:"#0f1923",margin:"0 0 8px"}}>Ready to launch a new campaign?</p>
              <p style={{color:"#64748b",fontSize:"14px",margin:"0 0 20px"}}>Select a provider list and we'll generate personalized sequences automatically</p>
              <Btn style={{padding:"12px 32px",fontSize:"14px"}}>+ New Campaign</Btn>
            </Card>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
