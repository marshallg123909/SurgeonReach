const searchNPI = async (taxonomy, state, city, limit) => {
  const params = new URLSearchParams({ taxonomy, state, limit });
  if (city && city.trim()) params.set("city", city.trim());
  const res = await fetch(BACKEND_URL + "/npi?" + params.toString());
  if (!res.ok) throw new Error("Search failed with status " + res.status);
  return await res.json();
};

const callClaudeAPI = async (prompt) => {
  const res = await fetch(BACKEND_URL + "/claude", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ prompt })
  });
  if (!res.ok) throw new Error("Claude API failed with status " + res.status);
  const data = await res.json();
  return data.content?.map(c=>c.text||"").join("") || "No response";
};

function Badge({children,color="#0d9488",bg="#f0fdfa"}){
  return <span style={{fontSize:"11px",fontWeight:600,padding:"2px 8px",borderRadius:"20px",background:bg,color,border:`1px solid ${color}22`,display:"inline-block"}}>{children}</span>;
}
function StatusBadge({status}){
  const m={
    hot:{color:"#dc2626",bg:"#fef2f2",label:"Hot"},
    warm:{color:"#d97706",bg:"#fffbeb",label:"Warm"},
    contacted:{color:"#64748b",bg:"#f8fafc",label:"Contacted"},
    new:{color:"#0284c7",bg:"#f0f9ff",label:"New"},
    meeting:{color:"#7c3aed",bg:"#f5f3ff",label:"Meeting Booked"},
    closed:{color:"#059669",bg:"#ecfdf5",label:"Closed"},
  };
  const s=m[status]||m.new;
  return <Badge color={s.color} bg={s.bg}>{s.label}</Badge>;
}
function ScorePill({score}){
  if(!score) return <span style={{color:"#94a3b8"}}>—</span>;
  const c=score>=8?"#059669":score>=6?"#d97706":"#dc2626";
  const b=score>=8?"#ecfdf5":score>=6?"#fffbeb":"#fef2f2";
  return <span style={{fontWeight:700,fontSize:"15px",color:c,background:b,padding:"2px 10px",borderRadius:"8px"}}>{score}<span style={{fontSize:"11px",fontWeight:500,opacity:0.7}}>/10</span></span>;
}
function Card({children,style={}}){return <div style={{background:"white",border:"1px solid #e8edf2",borderRadius:"12px",padding:"20px",...style}}>{children}</div>;}
function Btn({children,onClick,variant="primary",style={},disabled=false}){
  const v={primary:{background:TEAL,color:"white",border:"none"},secondary:{background:"white",color:"#374151",border:"1px solid #d1d5db"},ghost:{background:"transparent",color:TEAL,border:`1px solid ${TEAL}33`},danger:{background:"#fef2f2",color:"#dc2626",border:"1px solid #fca5a5"}};
  return <button onClick={onClick} disabled={disabled} style={{...v[variant],borderRadius:"8px",padding:"8px 16px",fontWeight:600,fontSize:"13px",cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.6:1,...style}}>{children}</button>;
}

          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"14px",marginBottom:"24px"}}>
            {[
              {label:"Total Products",value:inventory.length,color:TEAL,bg:TEAL_LIGHT},
              {label:"Total Units",value:inventory.reduce((a,i)=>a+i.qty,0),color:"#7c3aed",bg:"#f5f3ff"},
              {label:"Low Stock",value:inventory.filter(i=>i.qty<=i.minQty).length,color:"#d97706",bg:"#fffbeb"},
              {label:"Total Value",value:"$"+inventory.reduce((a,i)=>a+(i.qty*i.unitPrice),0).toLocaleString(),color:"#059669",bg:"#ecfdf5"},
            ].map(s=>(
              <Card key={s.label} style={{background:s.bg,border:`1px solid ${s.color}22`}}>
                <p style={{fontSize:"11px",fontWeight:600,color:s.color,letterSpacing:"0.04em",textTransform:"uppercase",margin:"0 0 8px"}}>{s.label}</p>
                <p style={{fontFamily:"'Instrument Serif',serif",fontSize:"32px",color:s.color,margin:0,lineHeight:1}}>{s.value}</p>
              </Card>
            ))}
          </div>

          {/* Category Filter */}
          <div style={{display:"flex",gap:"6px",marginBottom:"16px",flexWrap:"wrap"}}>
            {["All","Hip","Knee","Spine","Shoulder","Trauma","Other"].map(c=>(
              <button key={c} onClick={()=>setInvFilter(c)} style={{fontSize:"12px",padding:"5px 14px",borderRadius:"20px",border:`1px solid ${invFilter===c?TEAL:"#e2e8f0"}`,background:invFilter===c?TEAL_LIGHT:"white",color:invFilter===c?TEAL:"#64748b",cursor:"pointer",fontWeight:invFilter===c?600:500}}>
                {c}{c!=="All"?` (${inventory.filter(i=>i.category===c).length})`:""}</button>
            ))}
          </div>

          {/* Inventory Table */}
          <Card style={{padding:0,overflow:"hidden"}}>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 0.8fr 0.8fr 1fr 1.5fr",padding:"10px 18px",background:"#f8fafc",borderBottom:"1px solid #e8edf2",color:"#94a3b8",fontSize:"11px",fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase"}}>
              <span>Product</span><span>SKU</span><span>Category</span><span>Qty</span><span>Min Qty</span><span>Unit Price</span><span>Actions</span>
            </div>
            {(invFilter==="All"?inventory:inventory.filter(i=>i.category===invFilter)).map(item=>{
              const isLow=item.qty<=item.minQty;
              return(
                <div key={item.id} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 0.8fr 0.8fr 1fr 1.5fr",padding:"14px 18px",borderBottom:"1px solid #f1f5f9",alignItems:"center",background:isLow?"#fffbeb":"white"}}>
                  <div>
                    <p style={{margin:"0 0 2px",fontWeight:600,fontSize:"13px",color:"#0f1923"}}>{item.name}</p>
                    {item.notes&&<p style={{margin:0,color:isLow?"#d97706":"#94a3b8",fontSize:"11px"}}>{item.notes}</p>}
                  </div>
                  <p style={{margin:0,color:"#64748b",fontSize:"12px",fontFamily:"monospace"}}>{item.sku}</p>
                  <Badge color={DC(item.category==="Hip"?"Surgery":item.category==="Knee"?"Nursing":item.category==="Spine"?"Materials Management":"Administration")} bg={DCL(item.category==="Hip"?"Surgery":item.category==="Knee"?"Nursing":item.category==="Spine"?"Materials Management":"Administration")}>{item.category}</Badge>
                  <p style={{margin:0,fontSize:"15px",fontWeight:700,color:isLow?"#d97706":"#0f1923"}}>{item.qty}</p>
                  <p style={{margin:0,color:"#94a3b8",fontSize:"12px"}}>{item.minQty}</p>
                  <p style={{margin:0,color:"#059669",fontSize:"13px",fontWeight:600}}>${item.unitPrice.toLocaleString()}</p>
                  <div style={{display:"flex",gap:"6px"}}>
                    <Btn variant="ghost" style={{padding:"5px 10px",fontSize:"11px"}} onClick={()=>{setShowSell(item.id);setSellData({hospital:"",qty:"1",notes:""})}}>Sell</Btn>
                    <Btn variant="secondary" style={{padding:"5px 10px",fontSize:"11px"}} onClick={()=>{const q=prompt(`Add units to ${item.name}. Current qty: ${item.qty}`);if(q&&!isNaN(q)&&parseInt(q)>0){setInventory(p=>p.map(i=>i.id===item.id?{...i,qty:i.qty+parseInt(q)}:i));showNotif(`Added ${q} units to ${item.name}`)}}}>+ Restock</Btn>
                    <Btn variant="danger" style={{padding:"5px 10px",fontSize:"11px"}} onClick={()=>setInventory(p=>p.filter(i=>i.id!==item.id))}>Remove</Btn>
                  </div>
                </div>
              );
            })}
            {(invFilter==="All"?inventory:inventory.filter(i=>i.category===invFilter)).length===0&&<div style={{padding:"48px",textAlign:"center",color:"#94a3b8",fontSize:"14px"}}>No products in this category. Click "+ Add Product" to get started.</div>}
          </Card>

          {/* Add Product Modal */}
          {showAddInv&&(
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{background:"white",borderRadius:"16px",padding:"32px",width:"100%",maxWidth:"520px",boxShadow:"0 20px 60px rgba(0,0,0,0.15)",maxHeight:"90vh",overflowY:"auto"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}}>
                  <h2 style={{fontFamily:"'Instrument Serif',serif",fontSize:"22px",color:"#0f1923",margin:0}}>Add Product</h2>
                  <button onClick={()=>setShowAddInv(false)} style={{background:"none",border:"none",fontSize:"20px",cursor:"pointer",color:"#94a3b8"}}>×</button>
                </div>
                <div style={{marginBottom:"14px"}}>
                  <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Product Name *</label>
                  <input value={newInv.name} onChange={e=>setNewInv(p=>({...p,name:e.target.value}))} placeholder="e.g. Titanium Hip Stem 127mm" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"14px"}}>
                  <div>
                    <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>SKU</label>
                    <input value={newInv.sku} onChange={e=>setNewInv(p=>({...p,sku:e.target.value}))} placeholder="e.g. HIP-127-TI" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                  </div>
                  <div>
                    <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Category</label>
                    <select value={newInv.category} onChange={e=>setNewInv(p=>({...p,category:e.target.value}))} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923",background:"white"}}>
                      {["Hip","Knee","Spine","Shoulder","Trauma","Other"].map(c=><option key={c}>{c}</option>)}
                    </select>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px",marginBottom:"14px"}}>
                  <div>
                    <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Qty On Hand *</label>
                    <input type="number" value={newInv.qty} onChange={e=>setNewInv(p=>({...p,qty:e.target.value}))} placeholder="0" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                  </div>
                  <div>
                    <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Min Qty</label>
                    <input type="number" value={newInv.minQty} onChange={e=>setNewInv(p=>({...p,minQty:e.target.value}))} placeholder="2" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                  </div>
                  <div>
                    <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Unit Price $</label>
                    <input type="number" value={newInv.unitPrice} onChange={e=>setNewInv(p=>({...p,unitPrice:e.target.value}))} placeholder="0" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                  </div>
                </div>
                <div style={{marginBottom:"20px"}}>
                  <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Notes</label>
                  <input value={newInv.notes} onChange={e=>setNewInv(p=>({...p,notes:e.target.value}))} placeholder="Any additional notes..." style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                </div>
                <div style={{display:"flex",gap:"10px",justifyContent:"flex-end"}}>
                  <Btn variant="secondary" onClick={()=>setShowAddInv(false)}>Cancel</Btn>
                  <Btn onClick={()=>{
                    if(!newInv.name||!newInv.qty){showNotif("Please enter product name and quantity","error");return;}
                    setInventory(p=>[...p,{id:Date.now(),name:newInv.name,sku:newInv.sku,category:newInv.category,qty:parseInt(newInv.qty)||0,minQty:parseInt(newInv.minQty)||2,unitPrice:parseFloat(newInv.unitPrice)||0,notes:newInv.notes}]);
                    setNewInv({name:"",sku:"",category:"Hip",qty:"",minQty:"",unitPrice:"",notes:""});
                    setShowAddInv(false);
                    showNotif("Product added to inventory!");
                  }}>Add Product</Btn>
                </div>
              </div>
            </div>
          )}

          {/* Sell Modal */}
          {showSell&&(()=>{
            const item=inventory.find(i=>i.id===showSell);
            return(
              <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div style={{background:"white",borderRadius:"16px",padding:"32px",width:"100%",maxWidth:"440px",boxShadow:"0 20px 60px rgba(0,0,0,0.15)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
                    <h2 style={{fontFamily:"'Instrument Serif',serif",fontSize:"22px",color:"#0f1923",margin:0}}>Record Sale</h2>
                    <button onClick={()=>setShowSell(null)} style={{background:"none",border:"none",fontSize:"20px",cursor:"pointer",color:"#94a3b8"}}>×</button>
                  </div>
                  <div style={{background:"#f8fafc",border:"1px solid #e8edf2",borderRadius:"8px",padding:"12px",marginBottom:"18px"}}>
                    <p style={{margin:"0 0 2px",fontWeight:600,fontSize:"13px",color:"#0f1923"}}>{item?.name}</p>
                    <p style={{margin:0,color:"#64748b",fontSize:"12px"}}>Available: {item?.qty} units · ${item?.unitPrice?.toLocaleString()} each</p>
                  </div>
                  <div style={{marginBottom:"14px"}}>
                    <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Hospital / Buyer *</label>
                    <input value={sellData.hospital} onChange={e=>setSellData(p=>({...p,hospital:e.target.value}))} placeholder="e.g. Memorial Hermann" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                  </div>
                  <div style={{marginBottom:"14px"}}>
                    <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Quantity *</label>
                    <input type="number" value={sellData.qty} onChange={e=>setSellData(p=>({...p,qty:e.target.value}))} placeholder="1" min="1" max={item?.qty} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                  </div>
                  {sellData.qty&&item&&<div style={{background:"#ecfdf5",border:"1px solid #bbf7d0",borderRadius:"8px",padding:"10px 14px",marginBottom:"14px"}}>
                    <p style={{margin:0,color:"#059669",fontSize:"13px",fontWeight:600}}>Sale Value: ${(parseInt(sellData.qty||0)*item.unitPrice).toLocaleString()}</p>
                  </div>}
                  <div style={{marginBottom:"20px"}}>
                    <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Notes</label>
                    <input value={sellData.notes} onChange={e=>setSellData(p=>({...p,notes:e.target.value}))} placeholder="e.g. Dr. Mitchell case, PO #1234" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                  </div>
                  <div style={{display:"flex",gap:"10px",justifyContent:"flex-end"}}>
                    <Btn variant="secondary" onClick={()=>setShowSell(null)}>Cancel</Btn>
                    <Btn onClick={()=>{
                      if(!sellData.hospital||!sellData.qty){showNotif("Please enter hospital and quantity","error");return;}
                      const qty=parseInt(sellData.qty);
                      if(qty>item.qty){showNotif("Not enough inventory","error");return;}
                      setInventory(p=>p.map(i=>i.id===showSell?{...i,qty:i.qty-qty}:i));
                      setShowSell(null);
                      showNotif(`Sale recorded — ${qty} unit${qty>1?"s":""} sold to ${sellData.hospital} for $${(qty*item.unitPrice).toLocaleString()}!`);
                    }}>Record Sale</Btn>
                  </div>
                </div>
              </div>
            );
          })()}
        </div>}

        {/* SCHEDULE */}
        {tab==="schedule"&&<div className="fade-in">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"24px"}}>
            <div>
              <h1 style={{fontFamily:"'Instrument Serif',serif",fontSize:"30px",color:"#0f1923",margin:"0 0 4px"}}>OR Schedule</h1>
              <p style={{color:"#64748b",fontSize:"14px"}}>Manage your upcoming surgical cases and OR coverage</p>
            </div>
            <Btn onClick={()=>setShowAddCase(true)} style={{padding:"9px 20px",fontSize:"13px"}}>+ Add Case</Btn>
          </div>

          {/* Summary Cards */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"14px",marginBottom:"24px"}}>
            {[
              {label:"Total Cases",value:cases.length,color:TEAL,bg:TEAL_LIGHT},
              {label:"Confirmed",value:cases.filter(c=>c.status==="confirmed").length,color:"#059669",bg:"#ecfdf5"},
              {label:"Pending",value:cases.filter(c=>c.status==="pending").length,color:"#d97706",bg:"#fffbeb"},
              {label:"This Week",value:cases.filter(c=>{const d=new Date(c.date);const now=new Date();const week=new Date();week.setDate(now.getDate()+7);return d>=now&&d<=week}).length,color:"#7c3aed",bg:"#f5f3ff"},
            ].map(s=>(
              <Card key={s.label} style={{background:s.bg,border:`1px solid ${s.color}22`}}>
                <p style={{fontSize:"11px",fontWeight:600,color:s.color,letterSpacing:"0.04em",textTransform:"uppercase",margin:"0 0 8px"}}>{s.label}</p>
                <p style={{fontFamily:"'Instrument Serif',serif",fontSize:"40px",color:s.color,margin:0,lineHeight:1}}>{s.value}</p>
              </Card>
            ))}
          </div>

          {/* Status Filter */}
          <div style={{display:"flex",gap:"6px",marginBottom:"16px"}}>
            {["All","confirmed","pending","cancelled"].map(s=>{
              const colors={confirmed:{color:"#059669",bg:"#ecfdf5"},pending:{color:"#d97706",bg:"#fffbeb"},cancelled:{color:"#dc2626",bg:"#fef2f2"},All:{color:TEAL,bg:TEAL_LIGHT}};
              const c=colors[s]||colors.All;
              return(<button key={s} onClick={()=>setSchedFilter(s)} style={{fontSize:"12px",padding:"5px 14px",borderRadius:"20px",border:`1px solid ${schedFilter===s?c.color:"#e2e8f0"}`,background:schedFilter===s?c.bg:"white",color:schedFilter===s?c.color:"#64748b",cursor:"pointer",fontWeight:schedFilter===s?600:500,textTransform:"capitalize"}}>{s}{s!=="All"?` (${cases.filter(c=>c.status===s).length})`:""}</button>);
            })}
          </div>

          {/* Cases List */}
          <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
            {(schedFilter==="All"?cases:cases.filter(c=>c.status===schedFilter)).sort((a,b)=>new Date(a.date)-new Date(b.date)).map(c=>{
              const statusColors={confirmed:{color:"#059669",bg:"#ecfdf5"},pending:{color:"#d97706",bg:"#fffbeb"},cancelled:{color:"#dc2626",bg:"#fef2f2"}};
              const sc=statusColors[c.status]||statusColors.pending;
              const isToday=c.date===new Date().toISOString().split("T")[0];
              return(
                <Card key={c.id} style={{border:isToday?`2px solid ${TEAL}`:"1px solid #e8edf2",opacity:c.status==="cancelled"?0.6:1}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr auto",gap:"16px",alignItems:"center"}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}}>
                        {isToday&&<Badge color={TEAL} bg={TEAL_LIGHT}>TODAY</Badge>}
                        <Badge color={sc.color} bg={sc.bg} style={{textTransform:"capitalize"}}>{c.status}</Badge>
                      </div>
                      <p style={{margin:"0 0 2px",fontWeight:700,fontSize:"14px",color:"#0f1923"}}>{c.procedure}</p>
                      <p style={{margin:0,color:"#94a3b8",fontSize:"12px"}}>{c.patient}</p>
                    </div>
                    <div>
                      <p style={{margin:"0 0 2px",fontWeight:600,fontSize:"13px",color:"#0f1923"}}>{c.surgeon}</p>
                      <p style={{margin:0,color:"#64748b",fontSize:"12px"}}>{c.hospital}</p>
                    </div>
                    <div>
                      <p style={{margin:"0 0 2px",fontWeight:600,fontSize:"13px",color:"#0f1923"}}>{new Date(c.date+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</p>
                      <p style={{margin:0,color:"#64748b",fontSize:"12px"}}>🕐 {c.time}</p>
                    </div>
                    <div>
                      <p style={{margin:"0 0 2px",fontSize:"12px",color:"#64748b"}}>Device</p>
                      <p style={{margin:0,fontWeight:600,fontSize:"13px",color:"#0f1923"}}>{c.device}</p>
                      {c.notes&&<p style={{margin:"2px 0 0",color:"#94a3b8",fontSize:"11px"}}>{c.notes}</p>}
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
                      {c.status==="pending"&&<Btn variant="ghost" style={{padding:"5px 12px",fontSize:"11px"}} onClick={()=>setCases(p=>p.map(x=>x.id===c.id?{...x,status:"confirmed"}:x))}>Confirm ✓</Btn>}
                      {c.status==="confirmed"&&<Btn variant="secondary" style={{padding:"5px 12px",fontSize:"11px",color:"#dc2626"}} onClick={()=>setCases(p=>p.map(x=>x.id===c.id?{...x,status:"cancelled"}:x))}>Cancel</Btn>}
                      <Btn variant="danger" style={{padding:"5px 12px",fontSize:"11px"}} onClick={()=>setCases(p=>p.filter(x=>x.id!==c.id))}>Remove</Btn>
                    </div>
                  </div>
                </Card>
              );
            })}
            {(schedFilter==="All"?cases:cases.filter(c=>c.status===schedFilter)).length===0&&(
              <Card style={{textAlign:"center",padding:"48px"}}>
                <p style={{color:"#94a3b8",fontSize:"14px",margin:"0 0 12px"}}>No cases found.</p>
                <Btn onClick={()=>setShowAddCase(true)}>+ Add Your First Case</Btn>
              </Card>
            )}
          </div>

          {/* Add Case Modal */}
          {showAddCase&&(
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{background:"white",borderRadius:"16px",padding:"32px",width:"100%",maxWidth:"560px",boxShadow:"0 20px 60px rgba(0,0,0,0.15)",maxHeight:"90vh",overflowY:"auto"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}}>
                  <h2 style={{fontFamily:"'Instrument Serif',serif",fontSize:"22px",color:"#0f1923",margin:0}}>Add Surgical Case</h2>
                  <button onClick={()=>setShowAddCase(false)} style={{background:"none",border:"none",fontSize:"20px",cursor:"pointer",color:"#94a3b8"}}>×</button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
                  <div style={{gridColumn:"span 2"}}>
                    <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Procedure *</label>
                    <input value={newCase.procedure} onChange={e=>setNewCase(p=>({...p,procedure:e.target.value}))} placeholder="e.g. Total Hip Replacement" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                  </div>
                  <div>
                    <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Patient ID</label>
                    <input value={newCase.patient} onChange={e=>setNewCase(p=>({...p,patient:e.target.value}))} placeholder="e.g. Patient A" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                  </div>
                  <div>
                    <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Surgeon *</label>
                    <input value={newCase.surgeon} onChange={e=>setNewCase(p=>({...p,surgeon:e.target.value}))} placeholder="e.g. Dr. James Mitchell" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                  </div>
                  <div style={{gridColumn:"span 2"}}>
                    <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Hospital *</label>
                    <input value={newCase.hospital} onChange={e=>setNewCase(p=>({...p,hospital:e.target.value}))} placeholder="e.g. Memorial Hermann" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                  </div>
                  <div>
                    <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Date *</label>
                    <input type="date" value={newCase.date} onChange={e=>setNewCase(p=>({...p,date:e.target.value}))} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                  </div>
                  <div>
                    <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Time</label>
                    <input type="time" value={newCase.time} onChange={e=>setNewCase(p=>({...p,time:e.target.value}))} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                  </div>
                  <div style={{gridColumn:"span 2"}}>
                    <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Device / Product</label>
                    <input value={newCase.device} onChange={e=>setNewCase(p=>({...p,device:e.target.value}))} placeholder="e.g. Titanium Hip Stem 127mm" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                  </div>
                  <div>
                    <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Status</label>
                    <select value={newCase.status} onChange={e=>setNewCase(p=>({...p,status:e.target.value}))} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923",background:"white"}}>
                      <option value="pending">Pending</option>
                      <option value="confirmed">Confirmed</option>
                    </select>
                  </div>
                  <div>
                    <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Notes</label>
                    <input value={newCase.notes} onChange={e=>setNewCase(p=>({...p,notes:e.target.value}))} placeholder="Any additional notes..." style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                  </div>
                </div>
                <div style={{display:"flex",gap:"10px",justifyContent:"flex-end",marginTop:"20px"}}>
                  <Btn variant="secondary" onClick={()=>setShowAddCase(false)}>Cancel</Btn>
                  <Btn onClick={()=>{
                    if(!newCase.procedure||!newCase.surgeon||!newCase.hospital||!newCase.date){showNotif("Please fill in procedure, surgeon, hospital and date","error");return;}
                    setCases(p=>[...p,{id:Date.now(),...newCase,rep:"Alex Johnson"}]);
                    setNewCase({patient:"",surgeon:"",hospital:"",date:"",time:"",procedure:"",device:"",status:"pending",notes:""});
                    setShowAddCase(false);
                    showNotif("Case added to schedule!");
                  }}>Add Case</Btn>
                </div>
              </div>
            </div>
          )}
        </div>}

        {/* CONSIGNMENT */}
        {tab==="consignment"&&<div className="fade-in">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"24px"}}>
            <div>
              <h1 style={{fontFamily:"'Instrument Serif',serif",fontSize:"30px",color:"#0f1923",margin:"0 0 4px"}}>Consignment Tracker</h1>
              <p style={{color:"#64748b",fontSize:"14px"}}>Track inventory placed at hospitals on consignment — record usage and reconcile monthly</p>
            </div>
            <Btn onClick={()=>setShowAddCons(true)} style={{padding:"9px 20px",fontSize:"13px"}}>+ Place Consignment</Btn>
          </div>

          {/* Summary Cards */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"14px",marginBottom:"24px"}}>
            {[
              {label:"Hospitals",value:[...new Set(consignment.map(c=>c.hospital))].length,color:TEAL,bg:TEAL_LIGHT},
              {label:"Total Items Placed",value:consignment.reduce((a,c)=>a+c.qtyPlaced,0),color:"#7c3aed",bg:"#f5f3ff"},
              {label:"Total Used",value:consignment.reduce((a,c)=>a+c.qtyUsed,0),color:"#059669",bg:"#ecfdf5"},
              {label:"Revenue Generated",value:"$"+consignment.reduce((a,c)=>a+(c.qtyUsed*c.unitPrice),0).toLocaleString(),color:"#d97706",bg:"#fffbeb"},
            ].map(s=>(
              <Card key={s.label} style={{background:s.bg,border:`1px solid ${s.color}22`}}>
                <p style={{fontSize:"11px",fontWeight:600,color:s.color,letterSpacing:"0.04em",textTransform:"uppercase",margin:"0 0 8px"}}>{s.label}</p>
                <p style={{fontFamily:"'Instrument Serif',serif",fontSize:s.label==="Revenue Generated"?"24px":"36px",color:s.color,margin:0,lineHeight:1}}>{s.value}</p>
              </Card>
            ))}
          </div>

          {/* Hospital Filter */}
          <div style={{display:"flex",gap:"6px",marginBottom:"16px",flexWrap:"wrap"}}>
            {["All",...new Set(consignment.map(c=>c.hospital))].map(h=>(
              <button key={h} onClick={()=>setConsFilter(h)} style={{fontSize:"12px",padding:"5px 14px",borderRadius:"20px",border:`1px solid ${consFilter===h?TEAL:"#e2e8f0"}`,background:consFilter===h?TEAL_LIGHT:"white",color:consFilter===h?TEAL:"#64748b",cursor:"pointer",fontWeight:consFilter===h?600:500}}>
                {h}
              </button>
            ))}
          </div>

          {/* Group by Hospital */}
          {[...new Set((consFilter==="All"?consignment:consignment.filter(c=>c.hospital===consFilter)).map(c=>c.hospital))].map(hospital=>{
            const hItems=(consFilter==="All"?consignment:consignment.filter(c=>c.hospital===consFilter)).filter(c=>c.hospital===hospital);
            const hRevenue=hItems.reduce((a,c)=>a+(c.qtyUsed*c.unitPrice),0);
            const hValue=hItems.reduce((a,c)=>a+(c.qtyRemaining*c.unitPrice),0);
            return(
              <div key={hospital} style={{marginBottom:"20px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
                    <h3 style={{fontFamily:"'Instrument Serif',serif",fontSize:"20px",color:"#0f1923",margin:0}}>{hospital}</h3>
                    <span style={{fontSize:"12px",color:"#64748b"}}>{hItems.length} products · Last count: {hItems[0]?.lastCount}</span>
                  </div>
                  <div style={{display:"flex",gap:"16px",fontSize:"13px"}}>
                    <span style={{color:"#059669",fontWeight:600}}>Revenue: ${hRevenue.toLocaleString()}</span>
                    <span style={{color:"#64748b"}}>On hand value: ${hValue.toLocaleString()}</span>
                  </div>
                </div>
                <Card style={{padding:0,overflow:"hidden"}}>
                  <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 0.8fr 0.8fr 0.8fr 1fr 1fr 1.5fr",padding:"10px 18px",background:"#f8fafc",borderBottom:"1px solid #e8edf2",color:"#94a3b8",fontSize:"11px",fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase"}}>
                    <span>Product</span><span>SKU</span><span>Placed</span><span>Used</span><span>Remaining</span><span>Unit Price</span><span>Value Used</span><span>Actions</span>
                  </div>
                  {hItems.map(item=>{
                    const isLow=item.qtyRemaining<=2;
                    return(
                      <div key={item.id} style={{display:"grid",gridTemplateColumns:"2fr 1fr 0.8fr 0.8fr 0.8fr 1fr 1fr 1.5fr",padding:"14px 18px",borderBottom:"1px solid #f1f5f9",alignItems:"center",background:isLow?"#fffbeb":"white"}}>
                        <div>
                          <p style={{margin:"0 0 2px",fontWeight:600,fontSize:"13px",color:"#0f1923"}}>{item.product}</p>
                          {item.notes&&<p style={{margin:0,color:isLow?"#d97706":"#94a3b8",fontSize:"11px"}}>{item.notes}</p>}
                        </div>
                        <p style={{margin:0,color:"#64748b",fontSize:"12px",fontFamily:"monospace"}}>{item.sku}</p>
                        <p style={{margin:0,color:"#64748b",fontSize:"13px",textAlign:"center"}}>{item.qtyPlaced}</p>
                        <p style={{margin:0,color:"#059669",fontSize:"13px",fontWeight:600,textAlign:"center"}}>{item.qtyUsed}</p>
                        <p style={{margin:0,fontSize:"13px",fontWeight:700,color:isLow?"#d97706":"#0f1923",textAlign:"center"}}>{item.qtyRemaining}</p>
                        <p style={{margin:0,color:"#64748b",fontSize:"13px"}}>${item.unitPrice.toLocaleString()}</p>
                        <p style={{margin:0,color:"#059669",fontSize:"13px",fontWeight:600}}>${(item.qtyUsed*item.unitPrice).toLocaleString()}</p>
                        <div style={{display:"flex",gap:"5px"}}>
                          <Btn variant="ghost" style={{padding:"4px 8px",fontSize:"11px"}} onClick={()=>{setShowRecordUse(item.id);setUseData({qtyUsed:"",notes:""})}}>Record Use</Btn>
                          <Btn variant="secondary" style={{padding:"4px 8px",fontSize:"11px"}} onClick={()=>{const q=prompt(`Restock ${item.product}. Add how many units?`);if(q&&!isNaN(q)&&parseInt(q)>0){setConsignment(p=>p.map(i=>i.id===item.id?{...i,qtyPlaced:i.qtyPlaced+parseInt(q),qtyRemaining:i.qtyRemaining+parseInt(q)}:i));showNotif(`Restocked ${q} units at ${item.hospital}`)}}}>Restock</Btn>
                          <Btn variant="danger" style={{padding:"4px 8px",fontSize:"11px"}} onClick={()=>setConsignment(p=>p.filter(i=>i.id!==item.id))}>✕</Btn>
                        </div>
                      </div>
                    );
                  })}
                  {/* Hospital Total Row */}
                  <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 0.8fr 0.8fr 0.8fr 1fr 1fr 1.5fr",padding:"12px 18px",background:"#f8fafc",borderTop:"2px solid #e8edf2",alignItems:"center"}}>
                    <p style={{margin:0,fontWeight:700,fontSize:"13px",color:"#0f1923",gridColumn:"span 3"}}>Hospital Total</p>
                    <p style={{margin:0,color:"#059669",fontWeight:700,fontSize:"13px",textAlign:"center"}}>{hItems.reduce((a,c)=>a+c.qtyUsed,0)}</p>
                    <p style={{margin:0,fontWeight:700,fontSize:"13px",textAlign:"center"}}>{hItems.reduce((a,c)=>a+c.qtyRemaining,0)}</p>
                    <p style={{margin:0}}></p>
                    <p style={{margin:0,color:"#059669",fontWeight:700,fontSize:"13px"}}>${hRevenue.toLocaleString()}</p>
                    <p style={{margin:0}}></p>
                  </div>
                </Card>
              </div>
            );
          })}

          {consignment.length===0&&(
            <Card style={{textAlign:"center",padding:"48px"}}>
              <p style={{color:"#94a3b8",fontSize:"14px",margin:"0 0 12px"}}>No consignment inventory placed yet.</p>
              <Btn onClick={()=>setShowAddCons(true)}>+ Place Your First Consignment</Btn>
            </Card>
          )}

          {/* Add Consignment Modal */}
          {showAddCons&&(
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{background:"white",borderRadius:"16px",padding:"32px",width:"100%",maxWidth:"500px",boxShadow:"0 20px 60px rgba(0,0,0,0.15)",maxHeight:"90vh",overflowY:"auto"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}}>
                  <h2 style={{fontFamily:"'Instrument Serif',serif",fontSize:"22px",color:"#0f1923",margin:0}}>Place Consignment</h2>
                  <button onClick={()=>setShowAddCons(false)} style={{background:"none",border:"none",fontSize:"20px",cursor:"pointer",color:"#94a3b8"}}>×</button>
                </div>
                <div style={{marginBottom:"14px"}}>
                  <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Hospital *</label>
                  <input value={newCons.hospital} onChange={e=>setNewCons(p=>({...p,hospital:e.target.value}))} placeholder="e.g. Memorial Hermann" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                </div>
                <div style={{marginBottom:"14px"}}>
                  <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Product Name *</label>
                  <input value={newCons.product} onChange={e=>setNewCons(p=>({...p,product:e.target.value}))} placeholder="e.g. Titanium Hip Stem 127mm" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"14px"}}>
                  <div>
                    <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>SKU</label>
                    <input value={newCons.sku} onChange={e=>setNewCons(p=>({...p,sku:e.target.value}))} placeholder="e.g. HIP-127-TI" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                  </div>
                  <div>
                    <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Unit Price $</label>
                    <input type="number" value={newCons.unitPrice} onChange={e=>setNewCons(p=>({...p,unitPrice:e.target.value}))} placeholder="0" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                  </div>
                </div>
                <div style={{marginBottom:"14px"}}>
                  <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Quantity Placed *</label>
                  <input type="number" value={newCons.qtyPlaced} onChange={e=>setNewCons(p=>({...p,qtyPlaced:e.target.value}))} placeholder="e.g. 6" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                </div>
                <div style={{marginBottom:"20px"}}>
                  <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Notes</label>
                  <input value={newCons.notes} onChange={e=>setNewCons(p=>({...p,notes:e.target.value}))} placeholder="Any additional notes..." style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                </div>
                <div style={{display:"flex",gap:"10px",justifyContent:"flex-end"}}>
                  <Btn variant="secondary" onClick={()=>setShowAddCons(false)}>Cancel</Btn>
                  <Btn onClick={()=>{
                    if(!newCons.hospital||!newCons.product||!newCons.qtyPlaced){showNotif("Please fill in hospital, product and quantity","error");return;}
                    const qty=parseInt(newCons.qtyPlaced)||0;
                    setConsignment(p=>[...p,{id:Date.now(),hospital:newCons.hospital,product:newCons.product,sku:newCons.sku,qtyPlaced:qty,qtyUsed:0,qtyRemaining:qty,unitPrice:parseFloat(newCons.unitPrice)||0,placedDate:new Date().toISOString().split("T")[0],lastCount:new Date().toISOString().split("T")[0],rep:"Alex Johnson",notes:newCons.notes}]);
                    setNewCons({hospital:"",product:"",sku:"",qtyPlaced:"",unitPrice:"",notes:""});
                    setShowAddCons(false);
                    showNotif("Consignment placed successfully!");
                  }}>Place Consignment</Btn>
                </div>
              </div>
            </div>
          )}

          {/* Record Usage Modal */}
          {showRecordUse&&(()=>{
            const item=consignment.find(i=>i.id===showRecordUse);
            return(
              <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div style={{background:"white",borderRadius:"16px",padding:"32px",width:"100%",maxWidth:"420px",boxShadow:"0 20px 60px rgba(0,0,0,0.15)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
                    <h2 style={{fontFamily:"'Instrument Serif',serif",fontSize:"22px",color:"#0f1923",margin:0}}>Record Usage</h2>
                    <button onClick={()=>setShowRecordUse(null)} style={{background:"none",border:"none",fontSize:"20px",cursor:"pointer",color:"#94a3b8"}}>×</button>
                  </div>
                  <div style={{background:"#f8fafc",border:"1px solid #e8edf2",borderRadius:"8px",padding:"12px",marginBottom:"18px"}}>
                    <p style={{margin:"0 0 2px",fontWeight:600,fontSize:"13px",color:"#0f1923"}}>{item?.product}</p>
                    <p style={{margin:0,color:"#64748b",fontSize:"12px"}}>{item?.hospital} · {item?.qtyRemaining} units remaining · ${item?.unitPrice?.toLocaleString()} each</p>
                  </div>
                  <div style={{marginBottom:"14px"}}>
                    <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Units Used *</label>
                    <input type="number" value={useData.qtyUsed} onChange={e=>setUseData(p=>({...p,qtyUsed:e.target.value}))} placeholder="1" min="1" max={item?.qtyRemaining} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                  </div>
                  {useData.qtyUsed&&item&&<div style={{background:"#ecfdf5",border:"1px solid #bbf7d0",borderRadius:"8px",padding:"10px 14px",marginBottom:"14px"}}>
                    <p style={{margin:0,color:"#059669",fontSize:"13px",fontWeight:600}}>Revenue: ${(parseInt(useData.qtyUsed||0)*item.unitPrice).toLocaleString()}</p>
                  </div>}
                  <div style={{marginBottom:"20px"}}>
                    <label style={{display:"block",fontSize:"11px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Notes</label>
                    <input value={useData.notes} onChange={e=>setUseData(p=>({...p,notes:e.target.value}))} placeholder="e.g. Dr. Mitchell case, PO #1234" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
                  </div>
                  <div style={{display:"flex",gap:"10px",justifyContent:"flex-end"}}>
                    <Btn variant="secondary" onClick={()=>setShowRecordUse(null)}>Cancel</Btn>
                    <Btn onClick={()=>{
                      if(!useData.qtyUsed){showNotif("Please enter units used","error");return;}
                      const qty=parseInt(useData.qtyUsed);
                      if(qty>item.qtyRemaining){showNotif("Not enough units remaining","error");return;}
                      setConsignment(p=>p.map(i=>i.id===showRecordUse?{...i,qtyUsed:i.qtyUsed+qty,qtyRemaining:i.qtyRemaining-qty,lastCount:new Date().toISOString().split("T")[0]}:i));
                      setShowRecordUse(null);
                      showNotif(`Usage recorded — $${(qty*item.unitPrice).toLocaleString()} revenue generated!`);
                    }}>Record Usage</Btn>
                  </div>
                </div>
              </div>
            );
          })()}
        </div>}

        {/* OUTREACH */}
        {tab==="outreach"&&<div className="fade-in">
          <div style={{marginBottom:"24px"}}>
            <h1 style={{fontFamily:"'Instrument Serif',serif",fontSize:"30px",color:"#0f1923",margin:"0 0 4px"}}>Outreach Sequences</h1>
            <p style={{color:"#64748b",fontSize:"14px"}}>Active automated campaigns across your target accounts</p>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px",marginBottom:"16px"}}>
            {[{name:"Texas Orthopedic Surgeons",status:"Active",sent:148,opens:62,replies:8,meetings:2,dept:"Surgery"},{name:"Materials Management — TX",status:"Active",sent:95,opens:41,replies:6,meetings:1,dept:"Materials Management"},{name:"OR Nursing Leadership",status:"Active",sent:67,opens:28,replies:5,meetings:1,dept:"Nursing"},{name:"Arizona Sports Medicine",status:"Paused",sent:73,opens:31,replies:4,meetings:1,dept:"Surgery"}].map(s=>(
              <Card key={s.name}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"14px"}}>
                  <div><p style={{margin:"0 0 6px",fontWeight:700,fontSize:"14px"}}>{s.name}</p><Badge color={DC(s.dept)} bg={DCL(s.dept)}>{s.dept}</Badge></div>
                  <Badge color={s.status==="Active"?"#059669":"#94a3b8"} bg={s.status==="Active"?"#ecfdf5":"#f8fafc"}>{s.status}</Badge>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",textAlign:"center",gap:"8px",marginBottom:"12px"}}>
                  {[["Sent",s.sent,"#64748b"],["Opens",s.opens,TEAL],["Replies",s.replies,"#d97706"],["Meetings",s.meetings,"#dc2626"]].map(([l,v,c])=>(
                    <div key={l} style={{background:"#f8fafc",borderRadius:"8px",padding:"10px 4px"}}>
                      <div style={{fontFamily:"'Instrument Serif',serif",fontSize:"24px",color:c,lineHeight:1}}>{v}</div>
                      <div style={{color:"#94a3b8",fontSize:"11px",marginTop:"2px"}}>{l}</div>
                    </div>
                  ))}
                </div>
                <div style={{background:"#f1f5f9",borderRadius:"4px",height:"4px",overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${Math.round(s.opens/s.sent*100)}%`,background:TEAL,borderRadius:"4px"}}/>
                </div>
                <p style={{color:"#94a3b8",fontSize:"11px",margin:"6px 0 0"}}>{Math.round(s.opens/s.sent*100)}% open rate</p>
              </Card>
            ))}
          </div>
          <Card style={{textAlign:"center",padding:"32px",border:`1px solid ${TEAL}22`,background:TEAL_LIGHT}}>
            <p style={{fontFamily:"'Instrument Serif',serif",fontSize:"22px",color:"#0f1923",margin:"0 0 8px"}}>Ready to launch a new campaign?</p>
            <p style={{color:"#64748b",fontSize:"14px",margin:"0 0 20px"}}>Select a provider list and we'll generate personalized sequences automatically</p>
            <Btn style={{padding:"12px 32px",fontSize:"14px"}}>+ New Campaign</Btn>
          </Card>
        </div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
