// Search NPI using allorigins proxy - works from any browser
const searchNPI = async (taxonomy, state, city, limit) => {
  const params = new URLSearchParams({
    taxonomy_description: taxonomy,
    state: state,
    limit: limit,
    version: "2.1",
    enumeration_type: "NPI-1"
  });
  if (city && city.trim()) params.set("city", city.trim().toUpperCase());
  
  const npiUrl = "https://npiregistry.cms.hhs.gov/api/?" + params;
  
  // Try multiple proxies in sequence
  const proxies = [
    `https://api.allorigins.win/get?url=${encodeURIComponent(npiUrl)}`,
    `https://corsproxy.io/?${encodeURIComponent(npiUrl)}`,
  ];

  for (const proxyUrl of proxies) {
    try {
      const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(10000) });
      const raw = await res.json();
      // allorigins wraps in {contents: "..."}
      const data = raw.contents ? JSON.parse(raw.contents) : raw;
      if (data && data.results !== undefined) return data;
    } catch(e) {
      continue;
    }
  }
  throw new Error("All proxies failed");
};

// Call Claude directly - works from browser in this context
const callClaudeAPI = async (prompt) => {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 400,
      messages: [{role: "user", content: prompt}]
    })
  });
  const data = await res.json();
  return data.content?.map(c=>c.text||"").join("") || "No response";
};

function Badge({children,color="#0d9488",bg="#f0fdfa"}){
  return <span style={{fontSize:"11px",fontWeight:600,padding:"2px 8px",borderRadius:"20px",background:bg,color,border:`1px solid ${color}22`,display:"inline-block"}}>{children}</span>;
}
function StatusBadge({status}){
  const m={hot:{color:"#dc2626",bg:"#fef2f2",label:"Hot"},warm:{color:"#d97706",bg:"#fffbeb",label:"Warm"},contacted:{color:"#64748b",bg:"#f8fafc",label:"Contacted"},new:{color:"#0284c7",bg:"#f0f9ff",label:"New"}};
  const s=m[status]||m.new;
  return <Badge color={s.color} bg={s.bg}>{s.label}</Badge>;
}
function ScorePill({score}){
  if(!score) return <span style={{color:"#94a3b8"}}>—</span>;
  const c=score>=8?"#059669":score>=6?"#d97706":"#dc2626";
  const b=score>=8?"#ecfdf5":score>=6?"#fffbeb":"#fef2f2";
  return <span style={{fontWeight:700,fontSize:"15px",color:c,background:b,padding:"2px 10px",borderRadius:"8px"}}>{score}<span style={{fontSize:"11px",fontWeight:500,opacity:0.7}}>/10</span></span>;
}
function Card({children,style={}}){return <div style={{background:"white",border:"1px solid #e8edf2",borderRadius:"12px",padding:"20px",...style}}>{children}</div>;}
function Btn({children,onClick,variant="primary",style={},disabled=false}){
  const v={primary:{background:TEAL,color:"white",border:"none"},secondary:{background:"white",color:"#374151",border:"1px solid #d1d5db"},ghost:{background:"transparent",color:TEAL,border:`1px solid ${TEAL}33`},danger:{background:"#fef2f2",color:"#dc2626",border:"1px solid #fca5a5"}};

}

            <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:"10px"}}>
              {["Surgery","Materials Management","Nursing","Administration","Pharmacy","Radiology"].map(d=>(
                <div key={d} onClick={()=>{setDept(d);setTab("pipeline")}} style={{background:DCL(d),border:`1px solid ${DC(d)}22`,borderRadius:"10px",padding:"14px",cursor:"pointer",textAlign:"center"}}>
                  <div style={{fontFamily:"'Instrument Serif',serif",fontSize:"28px",color:DC(d),marginBottom:"4px"}}>{leads.filter(l=>l.dept===d).length}</div>
                  <div style={{fontSize:"11px",fontWeight:600,color:DC(d),lineHeight:1.3}}>{d}</div>
                </div>
              ))}
            </div>
          </Card>
        </div>}

        {/* PIPELINE */}
        {tab==="pipeline"&&<div className="fade-in">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"20px"}}>
            <div>
              <h1 style={{fontFamily:"'Instrument Serif',serif",fontSize:"30px",color:"#0f1923",margin:"0 0 4px"}}>Lead Pipeline</h1>
              <p style={{color:"#64748b",fontSize:"14px"}}>{filtered.length} contacts</p>
            </div>
            <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
              {DEPTS.map(d=>(<button key={d} onClick={()=>setDept(d)} style={{fontSize:"12px",padding:"5px 12px",borderRadius:"20px",border:`1px solid ${dept===d?DC(d):"#e2e8f0"}`,background:dept===d?DCL(d):"white",color:dept===d?DC(d):"#64748b",cursor:"pointer",fontWeight:dept===d?600:500}}>{d}{d!=="All"?` · ${leads.filter(l=>l.dept===d).length}`:""}</button>))}
            </div>
          </div>
          <Card style={{padding:0,overflow:"hidden"}}>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1.3fr 1fr 0.6fr 0.6fr 0.8fr 1.6fr",padding:"10px 18px",background:"#f8fafc",borderBottom:"1px solid #e8edf2",color:"#94a3b8",fontSize:"11px",fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase"}}>
              <span>Contact</span><span>Hospital</span><span>Department</span><span>State</span><span>Score</span><span>Status</span><span>Actions</span>
            </div>
            {filtered.map(l=>{
              const sk="score_"+l.id,ek="email_"+l.id,isExp=selLead===l.id;
              return(<div key={l.id} style={{borderBottom:"1px solid #f1f5f9"}}>
                <div onClick={()=>setSelLead(isExp?null:l.id)} style={{display:"grid",gridTemplateColumns:"2fr 1.3fr 1fr 0.6fr 0.6fr 0.8fr 1.6fr",padding:"13px 18px",cursor:"pointer",background:isExp?TEAL_LIGHT:"white",alignItems:"center"}}>
                  <div><p style={{margin:"0 0 2px",fontWeight:600,fontSize:"13px"}}>{l.name}</p><p style={{margin:0,color:"#94a3b8",fontSize:"11px"}}>{l.spec}</p></div>
                  <p style={{margin:0,color:"#64748b",fontSize:"12px"}}>{l.hospital}</p>
                  <Badge color={DC(l.dept)} bg={DCL(l.dept)}>{l.dept}</Badge>
                  <p style={{margin:0,color:"#64748b",fontSize:"12px"}}>{l.state}</p>
                  <ScorePill score={l.score}/>
                  <StatusBadge status={l.status}/>
                  <div style={{display:"flex",gap:"6px"}} onClick={e=>e.stopPropagation()}>
                    <Btn variant="ghost" style={{padding:"5px 10px",fontSize:"11px"}} onClick={()=>callClaude(`Score this medical device lead 1-10 with 2 sentence reason. Name: ${l.name}, Role: ${l.spec}, Dept: ${l.dept}, Hospital: ${l.hospital}. Format: SCORE: X/10\nREASON: [reason]`,sk)}>{aiLoad[sk]?<span className="spinner"/>:"Score"}</Btn>
                    <Btn variant="secondary" style={{padding:"5px 10px",fontSize:"11px",color:TEAL}} onClick={()=>{callClaude(`Write a personalized cold outreach email under 90 words to ${l.name}, ${l.spec} in ${l.dept} at ${l.hospital}. We sell orthopedic implants. Professional, warm, not salesy. Email body only.`,ek);setSelLead(l.id)}}>{aiLoad[ek]?<span className="spinner"/>:"Draft Email"}</Btn>
                  </div>
                </div>
                {isExp&&<div style={{padding:"16px 18px 20px",background:TEAL_LIGHT,borderTop:`1px solid ${TEAL}22`}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"14px"}}>
                    <div style={{background:"white",borderRadius:"10px",padding:"14px",border:"1px solid #e8edf2"}}>
                      <p style={{color:"#94a3b8",fontSize:"11px",fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",margin:"0 0 10px"}}>Contact Info</p>
                      <p style={{color:"#374151",fontSize:"13px",margin:"0 0 4px"}}>📞 {l.phone||"N/A"}</p>
                      <p style={{color:"#374151",fontSize:"13px",margin:"0 0 4px"}}>📍 {l.city}, {l.state}</p>
                      {l.npi&&<p style={{color:"#94a3b8",fontSize:"11px",margin:0}}>NPI: {l.npi}</p>}
                    </div>
                    <div style={{background:"white",borderRadius:"10px",padding:"14px",border:"1px solid #e8edf2"}}>
                      <p style={{color:"#94a3b8",fontSize:"11px",fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",margin:"0 0 10px"}}>Notes</p>
                      <textarea value={noteText[l.id]!==undefined?noteText[l.id]:l.notes} onChange={e=>setNoteText(p=>({...p,[l.id]:e.target.value}))} placeholder="Add notes..." style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"6px",padding:"8px",fontSize:"12px",color:"#374151",resize:"none",height:"60px",fontFamily:"'Plus Jakarta Sans',sans-serif"}}/>
                      <Btn variant="ghost" style={{padding:"4px 10px",fontSize:"11px",marginTop:"6px"}} onClick={()=>{setLeads(p=>p.map(x=>x.id===l.id?{...x,notes:noteText[l.id]||""}:x));showNotif("Note saved")}}>Save Note</Btn>
                    </div>
                    <div style={{background:"white",borderRadius:"10px",padding:"14px",border:"1px solid #e8edf2"}}>
                      <p style={{color:"#94a3b8",fontSize:"11px",fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",margin:"0 0 10px"}}>{aiTexts[ek]?"AI Email Draft":aiTexts[sk]?"AI Score":"AI Output"}</p>
                      {!aiTexts[sk]&&!aiTexts[ek]&&!aiLoad[sk]&&!aiLoad[ek]&&<p style={{color:"#94a3b8",fontSize:"12px"}}>Click Score or Draft Email to generate AI content.</p>}
                      {(aiLoad[sk]||aiLoad[ek])&&<div className="spinner"/>}
                      {(aiTexts[sk]||aiTexts[ek])&&<p style={{color:"#374151",fontSize:"12px",lineHeight:1.6,margin:0,whiteSpace:"pre-line"}}>{aiTexts[ek]||aiTexts[sk]}</p>}
                    </div>
                  </div>
                </div>}
              </div>);
            })}
            {filtered.length===0&&<div style={{padding:"48px",textAlign:"center",color:"#94a3b8",fontSize:"14px"}}>No leads in this department yet.<br/><button onClick={()=>setTab("search")} style={{color:TEAL,background:"none",border:"none",cursor:"pointer",fontWeight:600,fontSize:"14px",marginTop:"8px"}}>Search for providers →</button></div>}
          </Card>
        </div>}

        {/* FIND PROVIDERS */}
        {tab==="search"&&<div className="fade-in">
          <div style={{marginBottom:"24px"}}>
            <h1 style={{fontFamily:"'Instrument Serif',serif",fontSize:"30px",color:"#0f1923",margin:"0 0 4px"}}>Find Providers</h1>
            <p style={{color:"#64748b",fontSize:"14px"}}>Search 900,000+ licensed healthcare providers from the NPI Registry</p>
          </div>
          <Card style={{marginBottom:"16px"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:"14px",marginBottom:"14px"}}>
              <div>
                <label style={{display:"block",fontSize:"12px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Specialty</label>
                <select value={sSpec} onChange={e=>setSSpec(e.target.value)} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923",background:"white"}}>
                  {SPECIALTIES.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}
                </select>
              </div>
              <div>
                <label style={{display:"block",fontSize:"12px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>State</label>
                <select value={sState} onChange={e=>setSState(e.target.value)} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923",background:"white"}}>
                  {STATES.map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
              <div>
                <label style={{display:"block",fontSize:"12px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>City <span style={{color:"#cbd5e1",fontWeight:400}}>(optional)</span></label>
                <input value={sCity} onChange={e=>setSCity(e.target.value)} placeholder="Leave blank for all cities" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923"}}/>
              </div>
              <div>
                <label style={{display:"block",fontSize:"12px",fontWeight:600,color:"#64748b",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.04em"}}>Results</label>
                <select value={sLimit} onChange={e=>setSLimit(e.target.value)} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"9px 12px",fontSize:"13px",color:"#0f1923",background:"white"}}>
                  <option value="10">10 results</option>
                  <option value="20">20 results</option>
                  <option value="50">50 results</option>
                  <option value="100">100 results</option>
                </select>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
              <Btn onClick={()=>!searching&&doSearch()} style={{padding:"10px 28px",fontSize:"14px"}} disabled={searching}>{searching?<span style={{display:"flex",alignItems:"center",gap:"8px"}}><span className="spinner" style={{width:"14px",height:"14px",borderTopColor:"white"}}/>Searching...</span>:"Search Providers →"}</Btn>
              <span style={{fontSize:"12px",color:"#94a3b8"}}>💡 Leave city blank for best results</span>
            </div>
          </Card>
          {searchErr&&!searching&&<div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:"10px",padding:"14px 18px",marginBottom:"14px"}}><p style={{color:"#92400e",fontSize:"13px",fontWeight:600,margin:"0 0 4px"}}>⚠ {searchErr}</p><p style={{color:"#b45309",fontSize:"12px",margin:0}}>Try a larger state like TX, CA, or FL and leave city blank.</p></div>}
          {sResults.length>0&&!searching&&<Card style={{padding:0,overflow:"hidden"}}>
            <div style={{padding:"14px 18px",borderBottom:"1px solid #f1f5f9",display:"flex",justifyContent:"space-between",alignItems:"center",background:"#f8fafc"}}>
              <span style={{fontWeight:700,fontSize:"15px"}}>✓ {sResults.length} providers found</span>
              <span style={{fontSize:"12px",color:"#94a3b8"}}>Live NPI Registry data</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1.5fr 1fr 0.8fr 0.8fr 1fr",padding:"10px 18px",background:"#f8fafc",borderBottom:"1px solid #e8edf2",color:"#94a3b8",fontSize:"11px",fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase"}}>
              <span>Provider</span><span>Organization</span><span>City</span><span>State</span><span>Type</span><span>Action</span>
            </div>
            {sResults.map((l,i)=>(
              <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1.5fr 1fr 0.8fr 0.8fr 1fr",padding:"12px 18px",borderBottom:"1px solid #f1f5f9",alignItems:"center",background:"white"}}>
                <div><p style={{margin:"0 0 2px",fontWeight:600,fontSize:"13px"}}>{l.name}</p><p style={{margin:0,color:"#94a3b8",fontSize:"11px"}}>{l.spec} · NPI {l.npi}</p></div>
                <p style={{margin:0,color:"#64748b",fontSize:"12px"}}>{l.hospital}</p>
                <p style={{margin:0,color:"#64748b",fontSize:"12px"}}>{l.city||"—"}</p>
                <p style={{margin:0,color:"#64748b",fontSize:"12px"}}>{l.state}</p>
                <Badge color={l.isPractice?"#d97706":"#0d9488"} bg={l.isPractice?"#fffbeb":"#f0fdfa"}>{l.isPractice?"Private":"Hospital"}</Badge>
                <Btn variant="ghost" style={{padding:"5px 12px",fontSize:"12px"}} onClick={()=>{setLeads(p=>[...p,{...l,id:Date.now()+i,score:Math.floor(Math.random()*4)+6,status:"contacted",lastContact:"Just added"}]);showNotif(`${l.name} added to pipeline!`)}}>+ Add</Btn>
              </div>
            ))}
          </Card>}
        </div>}

        {/* REPLIES */}
        {tab==="replies"&&<div className="fade-in">
          <div style={{marginBottom:"24px"}}>
            <h1 style={{fontFamily:"'Instrument Serif',serif",fontSize:"30px",color:"#0f1923",margin:"0 0 4px"}}>Reply Management</h1>
            <p style={{color:"#64748b",fontSize:"14px"}}>AI classifies responses and drafts replies — you approve before sending</p>
          </div>
          {replies.map(r=>{
            const rk="reply_"+r.id;
            const tm={positive:{color:"#059669",bg:"#ecfdf5",label:"Positive"},objection:{color:"#d97706",bg:"#fffbeb",label:"Objection"},hard_no:{color:"#dc2626",bg:"#fef2f2",label:"Hard No"}};
            const t=tm[r.type]||tm.objection;
            return(<Card key={r.id} style={{marginBottom:"14px",opacity:r.approved?0.6:1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
                <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                  <div style={{width:"36px",height:"36px",borderRadius:"50%",background:TEAL_LIGHT,display:"flex",alignItems:"center",justifyContent:"center",color:TEAL,fontWeight:700,fontSize:"14px"}}>{r.doctor.split(" ").pop()[0]}</div>
                  <div><p style={{margin:"0 0 3px",fontWeight:700,fontSize:"14px"}}>{r.doctor}</p><div style={{display:"flex",gap:"6px"}}><Badge color={DC(r.dept)} bg={DCL(r.dept)}>{r.dept}</Badge><Badge color={t.color} bg={t.bg}>{t.label}</Badge>{r.approved&&<Badge color="#059669" bg="#ecfdf5">✓ Sent</Badge>}</div></div>
                </div>
                <span style={{fontSize:"12px",color:"#94a3b8"}}>{r.time}</span>
              </div>
              <div style={{background:"#f8fafc",border:"1px solid #e8edf2",borderRadius:"8px",padding:"12px",marginBottom:"14px"}}>
                <p style={{color:"#94a3b8",fontSize:"11px",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",margin:"0 0 6px"}}>Their Message</p>
                <p style={{color:"#374151",margin:0,fontSize:"13px",lineHeight:1.6}}>{r.msg}</p>
              </div>
              {r.type==="hard_no"&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:"8px",padding:"10px 14px",color:"#dc2626",fontSize:"13px"}}>✗ Removed from all sequences — marked Do Not Contact</div>}
              {r.type!=="hard_no"&&!r.approved&&<div>
                {!aiTexts[rk]&&!aiLoad[rk]&&<Btn variant="ghost" onClick={()=>callClaude(r.type==="positive"?`Draft a warm professional reply to: "${r.msg}". Under 80 words. Suggest a 15-min call.`:`Tactful objection response to: "${r.msg}". Under 70 words. Keep door open.`,rk)}>⟳ Generate AI Response</Btn>}
                {aiLoad[rk]&&<div style={{display:"flex",alignItems:"center",gap:"8px"}}><span className="spinner"/><span style={{color:"#64748b",fontSize:"13px"}}>Drafting response...</span></div>}
                {aiTexts[rk]&&<div>
                  <div style={{background:TEAL_LIGHT,border:`1px solid ${TEAL}22`,borderRadius:"8px",padding:"14px",marginBottom:"12px"}}>
                    <p style={{color:"#94a3b8",fontSize:"11px",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",margin:"0 0 8px"}}>AI Drafted Response</p>
                    <p style={{color:"#0f1923",margin:0,fontSize:"13px",lineHeight:1.7}}>{aiTexts[rk]}</p>
                  </div>
                  <div style={{display:"flex",gap:"8px"}}>
                    <Btn onClick={()=>{setReplies(p=>p.map(x=>x.id===r.id?{...x,approved:true}:x));showNotif("Reply approved!")}}>✓ Approve & Send</Btn>
                    <Btn variant="secondary" onClick={()=>callClaude(`Rewrite with different angle: "${aiTexts[rk]}"`,rk)}>↺ Regenerate</Btn>
                  </div>
                </div>}
              </div>}
            </Card>);
          })}
        </div>}

        {/* OUTREACH */}
        {tab==="outreach"&&<div className="fade-in">
          <div style={{marginBottom:"24px"}}>
            <h1 style={{fontFamily:"'Instrument Serif',serif",fontSize:"30px",color:"#0f1923",margin:"0 0 4px"}}>Outreach Sequences</h1>
            <p style={{color:"#64748b",fontSize:"14px"}}>Active automated campaigns across your target accounts</p>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px",marginBottom:"16px"}}>
            {[{name:"Texas Orthopedic Surgeons",status:"Active",sent:148,opens:62,replies:8,meetings:2,dept:"Surgery"},{name:"Materials Management — TX",status:"Active",sent:95,opens:41,replies:6,meetings:1,dept:"Materials Management"},{name:"OR Nursing Leadership",status:"Active",sent:67,opens:28,replies:5,meetings:1,dept:"Nursing"},{name:"Arizona Sports Medicine",status:"Paused",sent:73,opens:31,replies:4,meetings:1,dept:"Surgery"}].map(s=>(
              <Card key={s.name}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"14px"}}>
                  <div><p style={{margin:"0 0 6px",fontWeight:700,fontSize:"14px"}}>{s.name}</p><Badge color={DC(s.dept)} bg={DCL(s.dept)}>{s.dept}</Badge></div>
                  <Badge color={s.status==="Active"?"#059669":"#94a3b8"} bg={s.status==="Active"?"#ecfdf5":"#f8fafc"}>{s.status}</Badge>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",textAlign:"center",gap:"8px",marginBottom:"12px"}}>
                  {[["Sent",s.sent,"#64748b"],["Opens",s.opens,TEAL],["Replies",s.replies,"#d97706"],["Meetings",s.meetings,"#dc2626"]].map(([l,v,c])=>(
                    <div key={l} style={{background:"#f8fafc",borderRadius:"8px",padding:"10px 4px"}}>
                      <div style={{fontFamily:"'Instrument Serif',serif",fontSize:"24px",color:c,lineHeight:1}}>{v}</div>
                      <div style={{color:"#94a3b8",fontSize:"11px",marginTop:"2px"}}>{l}</div>
                    </div>
                  ))}
                </div>
                <div style={{background:"#f1f5f9",borderRadius:"4px",height:"4px",overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${Math.round(s.opens/s.sent*100)}%`,background:TEAL,borderRadius:"4px"}}/>
                </div>
                <p style={{color:"#94a3b8",fontSize:"11px",margin:"6px 0 0"}}>{Math.round(s.opens/s.sent*100)}% open rate</p>
              </Card>
            ))}
          </div>
          <Card style={{textAlign:"center",padding:"32px",border:`1px solid ${TEAL}22`,background:TEAL_LIGHT}}>
            <p style={{fontFamily:"'Instrument Serif',serif",fontSize:"22px",color:"#0f1923",margin:"0 0 8px"}}>Ready to launch a new campaign?</p>
            <p style={{color:"#64748b",fontSize:"14px",margin:"0 0 20px"}}>Select a provider list and we'll generate personalized sequences automatically</p>
            <Btn style={{padding:"12px 32px",fontSize:"14px"}}>+ New Campaign</Btn>
          </Card>
        </div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
